<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CleanSphere Pro: Manager Dashboard Overview">
  <title>CleanSphere Pro - Manager Dashboard</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- SweetAlert2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
      tailwind.config = {
          theme: {
              extend: {
                  colors: {
                      primary: {
                          navy: '#1E3A8A',
                          royal: '#2563EB',
                          dark: '#0F172A',
                          hover: '#1E293B'
                      },
                      accent: {
                          blue: '#3B82F6',
                          light: '#EFF6FF'
                      },
                      status: {
                          dirty: '#EF4444',
                          clean: '#10B981',
                          occupied: '#3B82F6',
                          warning: '#F59E0B'
                      }
                  },
                  fontFamily: {
                      sans: ['Inter', 'sans-serif'],
                  }
              }
          }
      }
  </script>
  <style type="text/tailwindcss">
      @layer utilities {
          [v-cloak] {
              display: none !important;
          }
      }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex overflow-hidden font-sans">

  <div id="app" class="flex w-full h-screen" v-cloak>
    
    <!-- Fullscreen Initial Loader Overlay -->
    <div class="fixed inset-0 bg-slate-50 flex flex-col justify-center items-center z-[99999] gap-4" v-if="isInitializing">
      <div class="w-12 h-12 border-4 border-slate-200 border-t-primary-navy rounded-full animate-spin"></div>
      <div class="text-[15px] font-semibold text-primary-navy tracking-tight">Memverifikasi Sesi...</div>
    </div>
    
    <!-- Mobile Sidebar Backdrop Overlay -->
    <div class="fixed inset-0 bg-slate-900/50 z-[998] lg:hidden" v-if="isSidebarOpen" @click="isSidebarOpen = false"></div>

    <!-- Left Sidebar Component -->
    <sidebar-navigation 
      :current-user="currentUser" 
      :active-menu="activeMenu"
      :active-submenu="activeSubmenu"
      :is-sidebar-open="isSidebarOpen"
      @set-menu="setMenu"
      @toggle-menu="toggleMenu"
      @set-submenu="setSubmenu"
      @logout="handleLogout"
      @close-sidebar="isSidebarOpen = false"
    ></sidebar-navigation>

    <!-- Main Content Area -->
    <main class="flex-grow flex flex-col h-screen overflow-hidden">
      
      <!-- Top Header Navbar -->
      <header class="h-[80px] bg-white border-b border-slate-100 flex justify-between items-center px-4 md:px-10 shrink-0">
        <div class="flex items-center gap-4">
          <button class="lg:hidden bg-transparent border-none text-2xl text-slate-900 cursor-pointer p-1 outline-none" @click="isSidebarOpen = !isSidebarOpen">
            ☰
          </button>
          <div class="text-xl md:text-[22px] font-extrabold text-slate-900 tracking-tight">{{ getMenuTitle() }}</div>
        </div>
        
        <div class="flex items-center gap-4">
          <button v-if="currentUser && (currentUser.role === 'admin' || currentUser.role === 'manager')" @click="generateDailyDataLocal" class="px-3 md:px-4.5 py-2.5 text-[13px] font-semibold bg-indigo-50 border-1.5 border-indigo-500/20 rounded-lg text-indigo-700 cursor-pointer flex items-center gap-2 transition-all duration-200 hover:bg-indigo-100 hover:-translate-y-[1px]">
            <svg class="w-4 h-4 text-indigo-700" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
            </svg>
            Buat Data Harian
          </button>
          
          <button class="px-3 md:px-4.5 py-2.5 text-[13px] font-semibold bg-accent-light border-1.5 border-blue-500/10 rounded-lg text-primary-navy cursor-pointer flex items-center gap-2 transition-all duration-200 hover:bg-blue-100 hover:-translate-y-[1px]" @click="syncDataGlobal" :disabled="syncing">
            <svg class="w-4 h-4 text-primary-navy animate-spin" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" v-if="syncing">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            <svg class="w-4 h-4 text-primary-navy" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" v-else>
              <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0l3.181 3.183a8.25 8.25 0 0013.803-3.7M4.031 9.865a8.25 8.25 0 0113.803-3.7l3.181 3.182m0-4.991v4.99" />
            </svg>
            {{ syncing ? 'Syncing...' : 'Sync Data' }}
          </button>
        </div>
      </header>

      <!-- Workspace Area -->
      <section class="flex-grow p-4 md:p-10 overflow-y-auto">
        
        <!-- Render menu 1: Dashboard Overview -->
        <div v-if="activeSubmenu === 'overview'">
          <dashboard-overview
            :rooms-summary="roomsSummary"
            :total-rooms="totalRooms"
            :staff-active-count="staffActiveCount"
            :average-kpi="averageKpi"
            :critical-stock-alerts="criticalStockAlerts"
            :recent-activities="recentActivities"
          ></dashboard-overview>
        </div>

        <!-- Render menu 2 submenus -->
        <div v-else-if="activeSubmenu === 'room-grid'">
          <room-management-view
            :rooms="appState.rooms"
            :users="appState.users"
            :status-history="appState.room_status_history"
            @update-status="handleQuickUpdateStatus"
            @add-room="handleAddNewRoom"
            @update-room="handleEditRoomDetails"
            @delete-room="handleDeleteRoomDetails"
          ></room-management-view>
        </div>

        <div v-else-if="activeSubmenu === 'room-history'">
          <room-history-view
            :status-history="appState.room_status_history"
            :users="appState.users"
            :checklists="appState.room_checklist"
            :rooms="appState.rooms"
            @update-checklist="handleUpdateChecklistLog"
          ></room-history-view>
        </div>

        <div v-else-if="activeSubmenu === 'room-assignments'">
          <room-assignments-view
            :assignments="appState.room_assignments"
            :rooms="appState.rooms"
            :users="appState.users"
            @add-assignment="handleAddAssignment"
            @update-assignment="handleUpdateAssignment"
            @delete-assignment="handleDeleteAssignment"
          ></room-assignments-view>
        </div>

        <div v-else-if="activeSubmenu.startsWith('inventory-')">
          <inventory-management-view
            :sub-tab="activeSubmenu"
            :inventory="appState.inventory"
            :inventory-transactions="appState.inventory_transactions"
            :categories="appState.inventory_categories"
            :users="appState.users"
            @add-item="handleAddInventoryItem"
            @update-item="handleUpdateInventoryItem"
            @delete-item="handleDeleteInventoryItem"
            @record-tx="handleRecordInventoryTx"
            @add-category="handleAddCategory"
            @update-category="handleUpdateCategory"
          ></inventory-management-view>
        </div>

        <div v-else-if="activeSubmenu === 'staff-accounts' || activeSubmenu === 'leave-approvals' || activeSubmenu === 'shift-config' || activeSubmenu === 'attendance-kpi-report'">
          <staff-management-view
            :sub-tab="activeSubmenu"
            :users="appState.users"
            :shifts="appState.shifts"
            :attendance="appState.attendance"
            :leave-requests="appState.leave_requests"
            :room-checklist="appState.room_checklist"
            @add-user="handleAddUser"
            @update-user="handleUpdateUser"
            @approve-leave="handleApproveLeave"
            @add-shift="handleAddShift"
            @update-shift="handleUpdateShift"
          ></staff-management-view>
        </div>

        <div v-else-if="activeSubmenu === 'app-settings'">
          <app-settings-view
            :settings="appState.settings"
            :current-user="appState.currentUser"
            @update-settings="handleUpdateSettings"
            @update-admin="handleUpdateAdmin"
          ></app-settings-view>
        </div>

        <div v-else-if="activeSubmenu === 'housekeeping-master' || activeSubmenu === 'housekeeping-instances'">
          <housekeeping-projects-view
            :sub-tab="activeSubmenu"
            :masters="appState.housekeeping_project_master"
            :instances="appState.housekeeping_projects"
            :users="appState.users"
            @add-master="handleAddHouseKeepingMaster"
            @update-master="handleUpdateHouseKeepingMaster"
            @update-instance="handleUpdateHouseKeepingProject"
          ></housekeeping-projects-view>
        </div>

        <div v-else-if="activeSubmenu === 'staff-work-projects'">
          <staff-work-projects-view
            :projects="appState.staff_work_projects"
            :users="appState.users"
            @add-project="handleAddStaffWorkProject"
            @update-project="handleUpdateStaffWorkProject"
          ></staff-work-projects-view>
        </div>

        <!-- Fallback beautiful placeholder card for unbuilt pages -->
        <div v-else class="flex justify-center items-center h-full text-slate-500">
          <div class="text-center p-10 bg-white rounded-xl border-1.5 border-dashed border-blue-900/15 w-full max-w-[500px] shadow-lg">
            <div class="text-[56px] mb-4">📋</div>
            <h3 class="text-primary-navy text-[18px] font-bold">{{ getMenuTitle().split(' > ').pop() }}</h3>
            <p class="text-[13.5px] mt-2 leading-relaxed text-slate-500">Fitur ini sedang disiapkan dan diselaraskan secara bertahap sesuai kebutuhan operasional ERD & RACS.</p>
          </div>
        </div>

      </section>
    </main>

    <!-- Floating Global Toasts -->
    <div class="fixed top-5 right-5 z-[99999] flex flex-col gap-2.5 pointer-events-none" v-if="toast.show">
      <div :class="['px-5 py-3.5 rounded-lg text-white text-[13px] font-semibold shadow-lg flex items-center gap-2.5 pointer-events-auto transition-all animate-[slideIn_0.3s_ease]', 
        toast.type === 'pending' ? 'bg-primary-hover border-l-4 border-accent-blue' : 
        toast.type === 'success' ? 'bg-status-clean' : 
        toast.type === 'error' ? 'bg-status-dirty' : 
        'bg-primary-navy']">
        <span>{{ toast.message }}</span>
      </div>
    </div>

  </div>

  <!-- Load Vue 3 via CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  
  <!-- Load data.js (State & Client APIs) -->
  <script src="data.js"></script>

  <!-- Load Child Components -->
  <script src="components/SidebarNavigation.js"></script>
  <script src="components/DashboardOverview.js"></script>
  <script src="components/ChecklistDetailViewer.js"></script>
  <script src="components/ChecklistEditorModal.js"></script>
  <script src="components/RoomHistoryView.js"></script>
  <script src="components/RoomAssignmentsView.js"></script>
  <script src="components/RoomManagementView.js"></script>
  <script src="components/InventoryManagementView.js"></script>
  <script src="components/StaffManagementView.js"></script>
  <script src="components/AppSettingsView.js"></script>
  <script src="components/HouseKeepingProjectsView.js"></script>
  <script src="components/StaffWorkProjectsView.js"></script>

  <script>
    // =========================================================================
    // VUE CORE APP INSTANCE
    // =========================================================================
    const { createApp, ref, reactive, computed, onMounted } = Vue;

    createApp({
      components: {
        'sidebar-navigation': SidebarNavigation,
        'dashboard-overview': DashboardOverview,
        'room-management-view': RoomManagementView,
        'room-history-view': RoomHistoryView,
        'room-assignments-view': RoomAssignmentsView,
        'inventory-management-view': InventoryManagementView,
        'staff-management-view': StaffManagementView,
        'app-settings-view': AppSettingsView,
        'housekeeping-projects-view': HouseKeepingProjectsView,
        'staff-work-projects-view': StaffWorkProjectsView
      },
      setup() {
        const activeMenu = ref(1);
        const activeSubmenu = ref('overview');
        const loading = ref(false);
        const isInitializing = ref(true);
        const isSidebarOpen = ref(false);

        // Reactively pull state from data.js
        const toast = reactive(appState.toast);
        const syncing = computed(() => appState.syncing);
        const currentUser = computed(() => appState.currentUser);

        // Metrics computations
        const totalRooms = computed(() => {
          return appState.rooms.length || 20; // fallback default
        });

        const roomsSummary = computed(() => {
          const summary = { VC: 0, VD: 0, OC: 0, OD: 0, OOO: 0 };
          appState.rooms.forEach(r => {
            const st = r.room_status;
            if (st) {
              summary[st] = (summary[st] || 0) + 1;
            }
          });
          // Fallbacks for empty state simulation
          if (appState.rooms.length === 0) {
            summary.VC = 8;
            summary.VD = 5;
            summary.OC = 4;
            summary.OD = 2;
            summary.OOO = 1;
          }
          return summary;
        });

        const staffActiveCount = computed(() => {
          // Count active users with role = staff
          const staff = appState.users.filter(u => u.role === 'staff' && u.status === 'active');
          return staff.length || 12; // fallback default
        });

        const averageKpi = computed(() => {
          if (appState.room_checklist.length === 0) return 85; // default fallback
          const total = appState.room_checklist.reduce((sum, item) => sum + (item.kpi_score || 0), 0);
          return Math.round(total / appState.room_checklist.length);
        });

        const criticalStockAlerts = computed(() => {
          return appState.inventory
            .filter(item => item.stock_current < item.min_stock)
            .map(item => item.item_name);
        });

        // Simulate recent activities for dashboard view
        const recentActivities = computed(() => {
          const list = [];
          
          // 1. Process room checklists completed today
          appState.room_checklist.slice(-3).forEach(c => {
            list.push({
              id: 'rc_' + c.checklist_id,
              staff_name: getStaffNameById(c.staff_id),
              activity: `Pembersihan Kamar ${c.room_number}`,
              timestamp: c.end_time ? formatHM(c.end_time) : 'Hari Ini',
              details: `Selesai dalam ${c.duration_minutes || 0} menit.`,
              status: 'Completed'
            });
          });

          // 2. Process attendance clock ins
          appState.attendance.slice(-2).forEach(a => {
            list.push({
              id: 'att_' + a.attendance_id,
              staff_name: getStaffNameById(a.user_id),
              activity: a.status === 'in' ? 'Clock-In (Absen Masuk)' : 'Clock-Out (Absen Pulang)',
              timestamp: a.check_in_time || 'Hari Ini',
              details: `Mengikuti Shift: ${getShiftNameById(a.shift_id)}`,
              status: 'Done'
            });
          });

          // 3. Fallbacks to present realistic design if spreadsheet is empty
          if (list.length === 0) {
            list.push(
              { id: 1, staff_name: 'Budi Santoso', activity: 'Clock-In (Absen Masuk)', timestamp: '07:05 WIB', details: 'Mengikuti Shift Pagi', status: 'Done' },
              { id: 2, staff_name: 'Dewi Lestari', activity: 'Pembersihan Kamar 104', timestamp: '08:24 WIB', details: 'Selesai dalam 18 menit.', status: 'Completed' },
              { id: 3, staff_name: 'Budi Santoso', activity: 'Pembersihan Kamar 101', timestamp: '08:45 WIB', details: 'Selesai dalam 22 menit.', status: 'Completed' }
            );
          }

          return list;
        });

        // Helper string mappings
        const getStaffNameById = (id) => {
          const user = appState.users.find(u => u.user_id === id);
          return user ? user.name : id;
        };

        const getShiftNameById = (id) => {
          const s = appState.shifts.find(sh => sh.shift_id === id);
          return s ? s.shift_name : id;
        };

        const formatHM = (isoStr) => {
          const date = new Date(isoStr);
          if (isNaN(date.getTime())) return "";
          return `${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')} WIB`;
        };

        // --- Menu & Submenu handling ---
        const setMenu = (menuId, defaultSubmenu) => {
          activeMenu.value = menuId;
          activeSubmenu.value = defaultSubmenu;
          isSidebarOpen.value = false; // close overlay on mobile
        };

        const toggleMenu = (menuId, defaultSubmenu) => {
          if (activeMenu.value === menuId) {
            activeMenu.value = null; // collapse
          } else {
            activeMenu.value = menuId;
            activeSubmenu.value = defaultSubmenu;
          }
        };

        const setSubmenu = (submenuKey) => {
          activeSubmenu.value = submenuKey;
          isSidebarOpen.value = false; // close overlay on mobile
        };

        const getMenuTitle = () => {
          switch (activeSubmenu.value) {
            case 'overview': return 'Dashboard Utama';
            case 'room-grid': return 'Room Control Sheets > Room Grid View';
            case 'room-history': return 'Room Control Sheets > Riwayat Status Kamar';
            case 'room-assignments': return 'Room Control Sheets > Tugas Staff';
            case 'areas-data': return 'Area Control Sheets > Data Area';
            case 'area-shifts': return 'Area Control Sheets > Konfigurasi Shift Area';
            case 'staff-area-tasks': return 'Area Control Sheets > Penugasan Staf Area';
            case 'area-tasks-daily': return 'Area Control Sheets > Laporan Harian Area';
            case 'inventory-stock': return 'Manajemen Inventaris > Stok Barang';
            case 'inventory-log': return 'Manajemen Inventaris > Mutasi Stok';
            case 'inventory-categories': return 'Manajemen Inventaris > Konfigurasi Kategori';
            case 'housekeeping-master': return 'HouseKeeping Projects > Master Proyek Rutin';
            case 'housekeeping-instances': return 'HouseKeeping Projects > Daftar Tugas Proyek';
            case 'staff-work-projects': return 'Project Pekerjaan Staff';
            case 'staff-accounts': return 'Pengaturan Staff & Shift > Data Karyawan & Akun';
            case 'leave-approvals': return 'Pengaturan Staff & Shift > Persetujuan Izin & Cuti';
            case 'shift-config': return 'Pengaturan Staff & Shift > Shift Kerja';
            case 'attendance-kpi-report': return 'Pengaturan Staff & Shift > Laporan Absensi & KPI';
            case 'app-settings': return 'Pengaturan > Konfigurasi Sistem';
            default: return 'CleanSphere Pro';
          }
        };

        // Load spreadsheet data
        const syncDataGlobal = async () => {
          loading.value = true;
          await fetchDataFromServer();
          loading.value = false;
        };

        // Room Operations Handlers
        const handleQuickUpdateStatus = async (roomNumber, status, remarks) => {
          await updateRoomStatusLocal(roomNumber, status, remarks);
        };

        const handleUpdateChecklistLog = async (checklistId, tasksCompleted, linenChanged, refills, kpiScore, extraData) => {
          await updateRoomChecklistLocal(checklistId, tasksCompleted, linenChanged, refills, kpiScore, extraData);
        };

        const handleAddNewRoom = async (roomNumber, status, checklistConfig, remarks) => {
          await addRoomLocal(roomNumber, status, checklistConfig, remarks);
        };

        const handleEditRoomDetails = async (oldRoomNumber, newRoomNumber, status, checklistConfig, remarks) => {
          await updateRoomLocal(oldRoomNumber, newRoomNumber, status, checklistConfig, remarks);
        };

        const handleDeleteRoomDetails = async (roomNumber) => {
          await deleteRoomLocal(roomNumber);
        };

        // Room Assignments Handlers
        const handleAddAssignment = async (date, roomNumber, staffId, statusFrom, statusTo, remarks) => {
          await addRoomAssignmentLocal(date, roomNumber, staffId, statusFrom, statusTo, remarks);
        };

        // HouseKeeping & Staff Project Handlers
        const handleAddHouseKeepingMaster = async (title, description, periodType, staffIds, startDate) => {
          await addHouseKeepingMasterLocal(title, description, periodType, staffIds, startDate);
        };
        const handleUpdateHouseKeepingMaster = async (masterId, updates) => {
          await updateHouseKeepingMasterLocal(masterId, updates);
        };
        const handleUpdateHouseKeepingProject = async (projectId, updates) => {
          await updateHouseKeepingProjectLocal(projectId, updates);
        };
        const handleAddStaffWorkProject = async (title, description, period, staffId, date, photoBase64, photoName) => {
          // Implement if needed or rely on existing handleSubmitStaffWorkProjectAction
        };
        const handleUpdateStaffWorkProject = async (projectId, updates) => {
          // Update API
        };

        const handleUpdateAssignment = async (id, date, roomNumber, staffId, statusFrom, statusTo, remarks, status) => {
          await updateRoomAssignmentLocal(id, date, roomNumber, staffId, statusFrom, statusTo, remarks, status);
        };

        const handleDeleteAssignment = async (id) => {
          await deleteRoomAssignmentLocal(id);
        };

        // Inventory Handlers
        const handleAddInventoryItem = async (code, catId, name, initial, min, remarks) => {
          await addInventoryItemLocal(code, catId, name, initial, min, remarks);
        };
        const handleUpdateInventoryItem = async (id, code, catId, name, min, remarks) => {
          await updateInventoryItemLocal(id, code, catId, name, min, remarks);
        };
        const handleDeleteInventoryItem = async (id) => {
          await deleteInventoryItemLocal(id);
        };
        const handleRecordInventoryTx = async (itemId, type, qty, date, remarks) => {
          await recordInventoryTxLocal(itemId, type, qty, date, remarks);
        };
        const handleAddCategory = async (name, desc) => {
          await addCategoryLocal(name, desc);
        };
        const handleUpdateCategory = async (id, name, desc, isActive) => {
          await updateCategoryLocal(id, name, desc, isActive);
        };

        // Staffing Handlers
        const handleAddUser = async (username, password, name, role, shiftId) => {
          await addUserLocal(username, password, name, role, shiftId);
        };
        const handleUpdateUser = async (userId, username, password, name, role, shiftId, status) => {
          await updateUserLocal(userId, username, password, name, role, shiftId, status);
        };
        const handleApproveLeave = async (requestId, status) => {
          await approveLeaveLocal(requestId, status);
        };
        const handleAddShift = async (id, name, inTime, outTime, toleranceIn, toleranceOut) => {
          await addShiftLocal(id, name, inTime, outTime, toleranceIn, toleranceOut);
        };
        const handleUpdateShift = async (id, name, inTime, outTime, toleranceIn, toleranceOut, isActive) => {
          await updateShiftLocal(id, name, inTime, outTime, toleranceIn, toleranceOut, isActive);
        };

        // App Settings
        const handleUpdateSettings = async (settingsData, callback) => {
          await updateSettingsLocal(settingsData);
          if (callback) callback();
        };

        const handleUpdateAdmin = async (adminData, callback) => {
          await updateAdminCredentialsLocal(adminData);
          if (callback) callback();
        };

        // Logout
        const handleLogout = () => {
          logoutUser();
          const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");
          if (isGAS) {
            window.location.href = GAS_URL;
          } else {
            window.location.href = "Index.html";
          }
        };

        // Check login on startup
        onMounted(async () => {
          const loggedIn = await checkAutoLogin();
          isInitializing.value = false;

          // Force redirect if not manager
          if (!loggedIn || !appState.currentUser || appState.currentUser.role !== 'manager') {
            const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");
            if (isGAS) {
              window.location.href = GAS_URL;
            } else {
              window.location.href = "Index.html";
            }
          }
        });

        return {
          activeMenu,
          activeSubmenu,
          loading,
          isInitializing,
          isSidebarOpen,
          toast,
          syncing,
          currentUser,
          appState,

          // Metrics
          totalRooms,
          roomsSummary,
          staffActiveCount,
          averageKpi,
          criticalStockAlerts,
          recentActivities,

          // Navigation/Control actions
          setMenu,
          toggleMenu,
