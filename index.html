<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CleanSphere Pro: Housekeeping Management System Login Page">
    <title>CleanSphere Pro - Login</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <style>
        :root {
            /* Premium Dark Blue Theme */
            --primary-dark-navy: #0F172A;
            /* Slate 900 */
            --primary-navy: #1E3A8A;
            /* Deep Blue 900 */
            --primary-royal: #2563EB;
            /* Royal Blue 600 */
            --accent-blue: #3B82F6;
            /* Focus outline */
            --accent-light: #EFF6FF;
            /* Input background tint */
            --light-ice-blue: #F8FAFC;
            /* Page background */
            --white: #FFFFFF;
            --text-main: #1E293B;
            --text-muted: #64748B;
            --border-color: #E2E8F0;

            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.08), 0 2px 4px -2px rgba(0, 0, 0, 0.04);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            --radius-md: 12px;
            --radius-lg: 18px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at center, #EFF6FF 0%, #F1F5F9 100%);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Fullscreen Initial Loader */
        .initial-loader {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--white);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            gap: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid var(--border-color);
            border-top-color: var(--primary-navy);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        .loader-text {
            font-size: 15px;
            font-weight: 600;
            color: var(--primary-navy);
            letter-spacing: -0.2px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Login Form Card */
        .login-container {
            background-color: var(--white);
            width: 100%;
            max-width: 420px;
            padding: 45px 35px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        .login-container::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 6px;
            background: linear-gradient(to right, var(--primary-navy), var(--primary-royal), var(--accent-blue));
            border-top-left-radius: var(--radius-lg);
            border-top-right-radius: var(--radius-lg);
        }

        .brand-section {
            text-align: center;
            margin-bottom: 35px;
        }

        .brand-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary-navy), var(--primary-royal));
            color: var(--white);
            border-radius: var(--radius-md);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            font-weight: 800;
            margin: 0 auto 16px;
            box-shadow: 0 4px 10px rgba(30, 58, 138, 0.25);
        }

        h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-dark-navy);
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .brand-section p {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .login-form {
            width: 100%;
        }

        .form-group {
            margin-bottom: 22px;
            width: 100%;
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.75px;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            padding: 13px 16px;
            font-size: 15px;
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            background-color: var(--light-ice-blue);
            color: var(--text-main);
            transition: all 0.25s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary-royal);
            background-color: var(--white);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            color: var(--white);
            background-color: var(--primary-navy);
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
            box-shadow: var(--shadow-md);
        }

        .btn-login:hover {
            background-color: var(--primary-dark-navy);
            transform: translateY(-1px);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            background-color: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>

<body>

    <div id="app" style="width: 100%; display: flex; justify-content: center; align-items: center;">

        <!-- Fullscreen Initial Loading Spinner -->
        <div class="initial-loader" v-if="isInitializing">
            <div class="spinner"></div>
            <div class="loader-text">Memulihkan Sesi...</div>
        </div>

        <!-- Login Form Card -->
        <main class="login-container" v-if="!isInitializing">
            <div class="brand-section">
                <div class="brand-logo">CS</div>
                <h1>CleanSphere Pro</h1>
                <p>Housekeeping Management System</p>
            </div>

            <form class="login-form" @submit.prevent="handleLoginSubmit">
                <div class="form-group">
                    <label for="usernameInput">Username</label>
                    <div class="input-wrapper">
                        <input type="text" id="usernameInput" class="form-input" v-model="username"
                            placeholder="Masukkan username" required :disabled="loading">
                    </div>
                </div>

                <div class="form-group">
                    <label for="passwordInput">Password</label>
                    <div class="input-wrapper">
                        <input type="password" id="passwordInput" class="form-input" v-model="password"
                            placeholder="Masukkan password" required :disabled="loading">
                    </div>
                </div>

                <button type="submit" class="btn-login" :disabled="loading" id="loginBtn">
                    {{ loading ? 'Mengautentikasi...' : 'MASUK' }}
                </button>
            </form>
        </main>

    </div>

    <!-- Load Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Load data.js containing localState & actions -->
    <script src="data.js"></script>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const loading = ref(false);
                const isInitializing = ref(true);

                // Function to handle redirection
                const redirectUser = (role) => {
                    const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");

                    if (role === "manager") {
                        if (isGAS) {
                            window.location.href = GAS_URL + "?page=manager";
                        } else {
                            window.location.href = "manager.html";
                        }
                    } else if (role === "staff") {
                        if (isGAS) {
                            window.location.href = GAS_URL + "?page=staff";
                        } else {
                            window.location.href = "staff.html";
                        }
                    }
                };

                // Handle form login submit
                const handleLoginSubmit = async () => {
                    if (loading.value) return;
                    loading.value = true;

                    // Show non-blocking styled loading spinner via SweetAlert2
                    Swal.fire({
                        title: 'Mengautentikasi...',
                        text: 'Memverifikasi kredensial Anda, mohon tunggu.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    const result = await loginUser(username.value, password.value);

                    Swal.close();
                    loading.value = false;

                    if (result.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Login Berhasil!',
                            text: 'Membuka dashboard Anda...',
                            timer: 1500,
                            showConfirmButton: false
                        }).then(() => {
                            redirectUser(result.user.role);
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Gagal Masuk',
                            text: result.message || 'Kredensial salah atau terjadi kesalahan.',
                            confirmButtonColor: '#1E3A8A'
                        });
                    }
                };

                // Check auto login on mounted
                onMounted(async () => {
                    const token = localStorage.getItem("cs_session_token");
                    if (!token) {
                        isInitializing.value = false;
                        return;
                    }

                    // Call checkAutoLogin which connects to server
                    const loggedIn = await checkAutoLogin();

                    if (loggedIn && appState.currentUser) {
                        // Show alert for automatic login success
                        if (typeof Swal !== "undefined") {
                            Swal.fire({
                                icon: 'success',
                                title: 'Sesi Ditemukan',
                                text: 'Selamat datang kembali, ' + appState.currentUser.name + '.',
                                timer: 1000,
                                showConfirmButton: false
                            }).then(() => {
                                redirectUser(appState.currentUser.role);
                            });
                        } else {
                            redirectUser(appState.currentUser.role);
                        }
                    } else {
                        // If failed, checkAutoLogin already cleared localStorage. We just hide the spinner.
                        isInitializing.value = false;
                    }
                });

                return {
                    username,
                    password,
                    loading,
                    isInitializing,
                    handleLoginSubmit
                };
            }
        }).mount('#app');
    </script>
