<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CleanSphere Pro: Housekeeping Management System Login Page">
    <title>CleanSphere Pro - Login</title>

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            navy: '#1E3A8A',
                            royal: '#2563EB',
                            dark: '#0F172A'
                        },
                        accent: {
                            blue: '#3B82F6',
                            light: '#EFF6FF'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            [v-cloak] {
                display: none !important;
            }
        }
    </style>
</head>

<body class="bg-[radial-gradient(circle_at_center,_#EFF6FF_0%,_#F1F5F9_100%)] text-slate-800 flex justify-center items-center min-h-screen p-5 font-sans">

    <div id="app" class="w-full flex justify-center items-center" v-cloak>

        <!-- Fullscreen Initial Loading Spinner -->
        <div class="fixed inset-0 bg-white flex flex-col justify-center items-center z-[9999] gap-4" v-if="isInitializing">
            <div class="w-12 h-12 border-4 border-slate-200 border-t-primary-navy rounded-full animate-spin"></div>
            <div class="text-[15px] font-semibold text-primary-navy tracking-tight">Memulihkan Sesi...</div>
        </div>

        <!-- Login Form Card -->
        <main class="bg-white w-full max-w-[420px] px-9 py-11 rounded-[18px] shadow-2xl shadow-slate-200/50 border border-slate-200 flex flex-col items-center relative overflow-hidden" v-if="!isInitializing">
            <!-- Top Gradient Bar -->
            <div class="absolute top-0 left-0 right-0 h-1.5 bg-gradient-to-r from-primary-navy via-primary-royal to-accent-blue"></div>

            <div class="text-center mb-9">
                <div class="w-16 h-16 bg-gradient-to-br from-primary-navy to-primary-royal text-white rounded-xl flex justify-center items-center text-3xl font-extrabold mx-auto mb-4 shadow-[0_4px_10px_rgba(30,58,138,0.25)]">CS</div>
                <h1 class="text-2xl font-extrabold text-primary-dark mb-1.5 tracking-tight">CleanSphere Pro</h1>
                <p class="text-sm text-slate-500 font-medium">Housekeeping Management System</p>
            </div>

            <form class="w-full" @submit.prevent="handleLoginSubmit">
                <div class="mb-5 w-full flex flex-col">
                    <label for="usernameInput" class="text-xs font-bold text-slate-800 mb-2 uppercase tracking-wide">Username</label>
                    <div class="relative flex items-center">
                        <input type="text" id="usernameInput" class="w-full p-3.5 text-[15px] border border-slate-200 rounded-xl bg-slate-50 text-slate-800 transition-all duration-200 outline-none focus:border-primary-royal focus:bg-white focus:ring-4 focus:ring-blue-600/10" v-model="username"
                            placeholder="Masukkan username" required :disabled="loading">
                    </div>
                </div>

                <div class="mb-5 w-full flex flex-col">
                    <label for="passwordInput" class="text-xs font-bold text-slate-800 mb-2 uppercase tracking-wide">Password</label>
                    <div class="relative flex items-center">
                        <input type="password" id="passwordInput" class="w-full p-3.5 text-[15px] border border-slate-200 rounded-xl bg-slate-50 text-slate-800 transition-all duration-200 outline-none focus:border-primary-royal focus:bg-white focus:ring-4 focus:ring-blue-600/10" v-model="password"
                            placeholder="Masukkan password" required :disabled="loading">
                    </div>
                </div>

                <button type="submit" class="w-full p-3.5 text-[15px] font-bold text-white bg-primary-navy border-none rounded-xl cursor-pointer transition-all duration-200 mt-2.5 shadow-md hover:bg-primary-dark hover:-translate-y-[1px] active:translate-y-0 disabled:bg-slate-400 disabled:cursor-not-allowed disabled:transform-none" :disabled="loading" id="loginBtn">
                    {{ loading ? 'Mengautentikasi...' : 'MASUK' }}
                </button>
            </form>
        </main>

    </div>

    <!-- Load Vue 3 via CDN -->
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <!-- Load data.js containing localState & actions -->
    <script src="data.js?v=2"></script>

    <script>
        const { createApp, ref, onMounted } = Vue;

        createApp({
            setup() {
                const username = ref('');
                const password = ref('');
                const loading = ref(false);
                const isInitializing = ref(true);

                // Function to handle redirection
                const redirectUser = (role) => {
                    const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");

                    if (role === "manager") {
                        if (isGAS) {
                            window.location.href = GAS_URL + "?page=manager";
                        } else {
                            window.location.href = "manager.html";
                        }
                    } else if (role === "staff") {
                        if (isGAS) {
                            window.location.href = GAS_URL + "?page=staff";
                        } else {
                            window.location.href = "staff.html";
                        }
                    }
                };

                // Handle form login submit
                const handleLoginSubmit = async () => {
                    if (loading.value) return;
                    loading.value = true;

                    // Show non-blocking styled loading spinner via SweetAlert2
                    Swal.fire({
                        title: 'Mengautentikasi...',
                        text: 'Memverifikasi kredensial Anda, mohon tunggu.',
                        allowOutsideClick: false,
                        didOpen: () => {
                            Swal.showLoading();
                        }
                    });

                    const result = await loginUser(username.value, password.value);

                    Swal.close();
                    loading.value = false;

                    if (result.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Login Berhasil!',
                            text: 'Membuka dashboard Anda...',
                            timer: 1500,
                            showConfirmButton: false
                        }).then(() => {
                            redirectUser(result.user.role);
                        });
                    } else {
                        Swal.fire({
                            icon: 'error',
                            title: 'Gagal Masuk',
                            text: result.message || 'Kredensial salah atau terjadi kesalahan.',
                            confirmButtonColor: '#1E3A8A'
                        });
                    }
                };

                // Check auto login on mounted
                onMounted(async () => {
                    const token = localStorage.getItem("cs_session_token");
                    if (!token) {
                        isInitializing.value = false;
                        return;
                    }

                    // Call checkAutoLogin which connects to server
                    const loggedIn = await checkAutoLogin();

                    if (loggedIn && appState.currentUser) {
                        // Show alert for automatic login success
                        if (typeof Swal !== "undefined") {
                            Swal.fire({
                                icon: 'success',
                                title: 'Sesi Ditemukan',
                                text: 'Selamat datang kembali, ' + appState.currentUser.name + '.',
                                timer: 1000,
                                showConfirmButton: false
                            }).then(() => {
                                redirectUser(appState.currentUser.role);
                            });
                        } else {
                            redirectUser(appState.currentUser.role);
                        }
                    } else {
                        // If failed, checkAutoLogin already cleared localStorage. We just hide the spinner.
                        isInitializing.value = false;
                    }
                });

                return {
                    username,
                    password,
                    loading,
                    isInitializing,
                    handleLoginSubmit
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
