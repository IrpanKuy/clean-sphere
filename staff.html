<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CleanSphere - Staff App</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
      tailwind.config = {
          theme: {
              extend: {
                  colors: {
                      primary: {
                          navy: '#1E3A8A',
                          royal: '#2563EB',
                          dark: '#0F172A',
                          hover: '#1E293B'
                      },
                      accent: {
                          blue: '#3B82F6',
                          light: '#EFF6FF'
                      }
                  },
                  fontFamily: {
                      sans: ['Inter', 'sans-serif'],
                  }
              }
          }
      }
  </script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Load data.js (State & Client APIs) -->
  <script src="data.js?v=2"></script>

  <style>
    body {
      background-color: #f1f5f9; /* slate-100 */
      /* Prevent pull-to-refresh on mobile */
      overscroll-behavior-y: none;
    }
    .app-container {
      max-width: 480px; /* Tablet/large phone width */
      margin: 0 auto;
      min-height: 100vh;
      background-color: #ffffff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      position: relative;
      overflow-x: hidden;
    }
    
    /* Smooth transitions for view switching */
    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .fade-enter-from, .fade-leave-to {
      opacity: 0;
      transform: translateY(10px);
    }
  </style>
</head>
<body class="text-slate-800 antialiased font-sans">

<div id="app" class="app-container flex flex-col">
  
  <!-- Fullscreen Initial Loading Spinner -->
  <div class="fixed inset-0 bg-white flex flex-col justify-center items-center z-[9999] gap-4" v-if="isInitializing">
      <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
      <div class="text-[15px] font-semibold text-slate-700 tracking-tight">Memulihkan Sesi...</div>
  </div>

  <template v-else>
    <!-- =============================== -->
    <!-- 2. DASHBOARD VIEW               -->
    <!-- =============================== -->
    <div v-if="currentView === 'dashboard'" class="flex-1 flex flex-col bg-slate-50">
      <!-- Header -->
      <div class="bg-primary-navy pt-8 pb-16 px-6 relative rounded-b-[2.5rem] shadow-md z-10">
        <div class="flex justify-between items-center mb-6">
          <div class="text-white">
            <p class="text-sm text-blue-200">Selamat bekerja,</p>
            <h2 class="text-xl font-bold">{{ currentUser.name }}</h2>
          </div>
          <button @click="handleLogout" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </button>
        </div>
        <div class="text-center text-white">
          <div class="text-4xl font-bold tracking-tight mb-1">{{ currentTime }}</div>
          <div class="text-sm text-blue-200">{{ currentDate }}</div>
        </div>
      </div>
      
      <!-- Main Content Area (Overlaps header) -->
      <div class="px-6 -mt-8 relative z-20 flex-1 flex flex-col">
        <!-- Attendance Card -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 border border-slate-100 flex flex-col items-center">
          <div class="w-full grid grid-cols-2 gap-4 text-xs font-semibold text-slate-500 mb-6 border-b border-slate-100/60 pb-4">
            <div class="text-left">
              <span class="block text-slate-400 font-medium">Shift Kerja</span>
              <span class="text-sm font-bold text-primary-navy">{{ currentShift.name }}</span>
              <span class="block text-[10px] font-medium text-slate-500 mt-0.5">({{ currentShift.check_in_time }} - {{ currentShift.check_out_time }})</span>
            </div>
            <div class="text-right">
              <span class="block text-slate-400 font-medium">Status Kehadiran</span>
              <span :class="['text-sm font-black mt-0.5 block', 
                attendanceStatus === 'Belum Absen' ? 'text-amber-500' : 
                attendanceStatus.includes('Pending') ? 'text-blue-500' : 'text-emerald-500']">
                {{ attendanceStatus }}
              </span>
            </div>
          </div>
          
          <!-- Batas Waktu Absen Transparan di Awal -->
          <div class="w-full grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl border border-slate-100 text-xs mb-6">
            <div>
              <span class="block text-slate-400 font-medium">Bisa Absen Masuk Mulai</span>
              <span class="text-sm font-black text-slate-700 block mt-0.5">{{ earliestClockInTime }} WIB</span>
            </div>
            <div>
              <span class="block text-slate-400 font-medium">Bisa Absen Pulang Mulai</span>
              <span class="text-sm font-black text-slate-700 block mt-0.5">{{ earliestClockOutTime }} WIB</span>
            </div>
          </div>
          
          <!-- Giant Clock In / Out Button -->
          <button 
            @click="toggleAttendance" 
            :disabled="hasActiveLeaveToday"
            :class="['w-40 h-40 rounded-full flex flex-col items-center justify-center text-white transition-all duration-300 shadow-xl shadow-opacity-40 border-none cursor-pointer', 
              attendanceStatus === 'Absensi Belum Dibuat'
                ? 'bg-gradient-to-tr from-slate-400 to-slate-500 shadow-slate-500/20 active:scale-95'
                : (attendanceStatus === 'Belum Absen' 
                    ? (hasActiveLeaveToday 
                        ? 'bg-slate-300 shadow-none cursor-not-allowed' 
                        : (!checkClockInWindow().allowed 
                            ? 'bg-gradient-to-tr from-amber-500 to-yellow-400 shadow-yellow-500/20 active:scale-95' 
                            : 'bg-gradient-to-tr from-blue-600 to-primary-royal shadow-blue-500/40 active:scale-95'))
                    : (attendanceStatus === 'Sudah Clock-In (Pending)' 
                        ? 'bg-gradient-to-tr from-rose-500 to-rose-400 shadow-rose-500/40 active:scale-95' 
                        : 'bg-slate-300 shadow-none cursor-not-allowed'))]">
            <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="font-bold text-lg">
              {{ 
                attendanceStatus === 'Absensi Belum Dibuat' ? 'Clock In' :
                attendanceStatus === 'Belum Absen' ? (hasActiveLeaveToday ? 'Izin Aktif' : 'Clock In') :
                attendanceStatus === 'Sudah Clock-In (Pending)' ? 'Clock Out' : 'Selesai'
              }}
            </span>
            <span v-if="hasActiveLeaveToday" class="text-[10px] mt-1 font-medium bg-black/20 px-2 py-0.5 rounded-full">
              Izin Hari Ini
            </span>
            <span v-else-if="attendanceStatus === 'Absensi Belum Dibuat'" class="text-[10px] mt-1 font-medium bg-black/20 px-2 py-0.5 rounded-full">
              Belum Dibuat
            </span>
            <span v-else-if="attendanceStatus === 'Belum Absen' && !checkClockInWindow().allowed" class="text-[10px] mt-1 font-medium bg-black/20 px-2 py-0.5 rounded-full">
              Di Luar Jadwal
            </span>
          </button>
        </div>
  
        <!-- Menu Grid -->
        <h3 class="text-sm font-bold text-slate-700 mb-3 px-1">Menu Operasional</h3>
        <div class="grid grid-cols-2 gap-3 mb-8">
          
          <button @click="navigate('room-control')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-blue-100 hover:border-blue-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-primary-royal flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Room Control</span>
          </button>
  
          <button @click="navigate('area-control')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-indigo-100 hover:border-indigo-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Area Publik</span>
          </button>
  
          <button @click="navigate('housekeeping-projects')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-emerald-100 hover:border-emerald-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">HouseKeeping<br>Project</span>
          </button>
  
          <button @click="navigate('staff-projects')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-purple-100 hover:border-purple-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Proyek Staff</span>
          </button>
  
          <button @click="navigate('inventory')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-amber-100 hover:border-amber-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Pemakaian<br>Inventaris</span>
          </button>
  
          <button @click="navigate('leave')" :disabled="attendanceStatus !== 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus !== 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-rose-100 hover:border-rose-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Pengajuan<br>Izin / Cuti</span>
          </button>
  
        </div>
      </div>
    </div>

  <!-- =============================== -->
  <!-- 3. ROOM CONTROL VIEW            -->
  <!-- =============================== -->
  <div v-else-if="currentView === 'room-control'" class="flex-1 flex flex-col bg-slate-50 relative">
    <div class="bg-gradient-to-r from-primary-navy to-primary-royal px-5 py-5 flex items-center gap-4 text-white shadow-xl shadow-blue-900/10 z-10 relative rounded-b-3xl mb-2">
      <button @click="currentView = 'dashboard'" class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/30 transition-all active:scale-95 shadow-inner">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <h2 class="text-xl font-extrabold tracking-wide">Room Control</h2>
        <p class="text-blue-100 text-xs font-medium">Manajemen Pembersihan Kamar</p>
      </div>
    </div>

    <!-- Room List Header Tabs -->
    <div v-if="!selectedRoom" class="px-5 mb-2">
      <div class="bg-slate-100 p-1 rounded-xl flex gap-1">
        <button 
          @click="roomControlTab = 'rooms'"
          :class="['flex-1 py-2 text-xs font-extrabold rounded-lg border-none transition-all cursor-pointer', 
            roomControlTab === 'rooms' ? 'bg-white text-primary-navy shadow-sm' : 'bg-transparent text-slate-400 hover:text-slate-600']">
          Data Kamar
        </button>
        <button 
          @click="roomControlTab = 'history'"
          :class="['flex-1 py-2 text-xs font-extrabold rounded-lg border-none transition-all cursor-pointer', 
            roomControlTab === 'history' ? 'bg-white text-primary-navy shadow-sm' : 'bg-transparent text-slate-400 hover:text-slate-600']">
          Riwayat Perubahan
        </button>
      </div>
    </div>

    <!-- Room List Tab Content -->
    <div v-if="!selectedRoom && roomControlTab === 'rooms'" class="p-5 flex-1 overflow-y-auto">
      <!-- Search Input -->
      <div class="mb-4 relative">
        <input 
          type="text" 
          v-model="roomSearchQuery" 
          placeholder="Cari nomor kamar atau keterangan..." 
          class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 pl-10 text-xs font-bold text-slate-700 placeholder-slate-400 outline-none focus:border-blue-500 transition-colors shadow-[0_4px_20px_rgba(0,0,0,0.01)]">
        <svg class="absolute left-3.5 top-3.5 w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </div>

      <div class="flex items-center justify-between mb-4">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Daftar Kamar</p>
        <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2.5 py-1 rounded-full">{{ filteredRoomsList.length }} Kamar</span>
      </div>
      
      <div class="flex flex-col gap-4">
        <div v-for="room in filteredRoomsList" :key="room.room_number" class="bg-white rounded-2xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 relative overflow-hidden flex flex-col gap-4">
          <div :class="['absolute top-0 left-0 w-1.5 h-full transition-colors', 
            (room.room_status === 'OD' || room.room_status === 'MUR') ? 'bg-yellow-400' :
            room.room_status === 'OC' ? 'bg-green-800' :
            (room.room_status === 'VD' || room.room_status === 'OOO' || room.room_status === 'CO') ? 'bg-red-500' :
            room.room_status === 'VC' ? 'bg-emerald-500' :
            room.room_status === 'VCI' ? 'bg-blue-500' :
            (room.room_status === 'ED' || room.room_status === 'DO') ? 'bg-orange-500' :
            room.room_status === 'EA' ? 'bg-slate-400' :
            (room.room_status === 'NS' || room.room_status === 'SO' || room.room_status === 'NL') ? 'bg-slate-200' :
            room.room_status === 'RS' ? 'bg-[saddlebrown]' :
            (room.room_status === 'DND' || room.room_status === 'DL') ? 'bg-[#800000]' :
            room.room_status === 'OOS' ? 'bg-pink-400' :
            room.room_status === 'VIP' ? 'bg-purple-500' :
            room.room_status === 'COMP' ? 'bg-[#FDFBD3]' : 'bg-slate-400']"></div>
          
          <div class="flex items-start gap-4 pl-2">
            <div class="w-12 h-12 rounded-full flex items-center justify-center text-lg font-black bg-slate-50 text-slate-700 shrink-0">
              {{ room.room_number }}
            </div>
            <div class="flex-1 min-w-0">
              <div class="flex flex-wrap items-center gap-2 mb-2">
                <!-- Status Badge (Clickable to change status directly!) -->
                <span 
                  @click="changeStatusDirectly(room)"
                  :class="['px-3 py-1.5 rounded-xl text-xs font-black uppercase tracking-wide cursor-pointer hover:opacity-80 transition-all flex items-center gap-1.5 border shadow-sm', 
                    (room.room_status === 'OD' || room.room_status === 'MUR') ? 'bg-yellow-50 text-yellow-800 border-yellow-200' :
                    room.room_status === 'OC' ? 'bg-green-900 text-white border-green-950' :
                    (room.room_status === 'VD' || room.room_status === 'OOO' || room.room_status === 'CO') ? 'bg-red-50 text-red-800 border-red-200' :
                    room.room_status === 'VC' ? 'bg-emerald-50 text-emerald-800 border-emerald-200' :
                    room.room_status === 'VCI' ? 'bg-blue-50 text-blue-800 border-blue-200' :
                    (room.room_status === 'ED' || room.room_status === 'DO') ? 'bg-orange-50 text-orange-800 border-orange-200' :
                    room.room_status === 'EA' ? 'bg-slate-100 text-slate-700 border-slate-200' :
                    (room.room_status === 'NS' || room.room_status === 'SO' || room.room_status === 'NL') ? 'bg-white text-slate-600 border-slate-200' :
                    room.room_status === 'RS' ? 'bg-amber-50 text-amber-900 border-amber-200' : 
                    (room.room_status === 'DND' || room.room_status === 'DL') ? 'bg-[#800000]/10 text-[#800000] border-[#800000]/20' :
                    room.room_status === 'OOS' ? 'bg-pink-50 text-pink-800 border-pink-200' :
                    room.room_status === 'VIP' ? 'bg-purple-50 text-purple-800 border-purple-200' :
                    room.room_status === 'COMP' ? 'bg-[#FDFBD3] text-[#85754E] border-[#F9F5A4]' : 'bg-slate-50 text-slate-700 border-slate-200']"
                  title="Klik untuk ubah status secara langsung">
                  <span>{{ room.room_status }} - {{ getStatusName(room.room_status) }}</span>
                  <svg class="w-3.5 h-3.5 text-slate-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                </span>
                <span class="text-[10px] text-slate-400 font-semibold uppercase tracking-wide">
                  Ideal: {{ room.ideal_timer_minutes || 30 }} Mnt
                </span>
              </div>
              <p class="text-xs text-slate-500 font-medium whitespace-pre-wrap leading-relaxed">Ket: {{ room.remarks || 'Tidak ada keterangan' }}</p>
            </div>
          </div>
          
          <div class="w-full">
            <button @click="startCleaning(room)" class="w-full py-3 bg-gradient-to-r from-blue-600 to-primary-royal hover:from-blue-700 hover:to-blue-800 text-white text-xs font-bold rounded-xl border-none cursor-pointer shadow-md shadow-blue-500/20 active:scale-95 transition-all flex items-center justify-center gap-1.5">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              Mulai Pembersihan
            </button>
          </div>
        </div>
        
        <div v-if="filteredRoomsList.length === 0" class="text-center py-10 bg-white rounded-2xl border border-slate-100">
          <p class="text-xs font-bold text-slate-400">Tidak ada data kamar yang cocok.</p>
        </div>
      </div>
    </div>

    <!-- Room History Tab Content -->
    <div v-if="!selectedRoom && roomControlTab === 'history'" class="p-5 flex-1 overflow-y-auto">
      <!-- Search Input -->
      <div class="mb-4 relative">
        <input 
          type="text" 
          v-model="historySearchQuery" 
          placeholder="Cari nomor kamar atau status..." 
          class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 pl-10 text-xs font-bold text-slate-700 placeholder-slate-400 outline-none focus:border-blue-500 transition-colors shadow-[0_4px_20px_rgba(0,0,0,0.01)]">

              {{ cat.name }} 
              <span class="px-2 py-0.5 rounded text-[9px] font-bold uppercase bg-blue-50 text-blue-700 border border-blue-200 ml-1.5">
                {{ cat.type }}
              </span>
            </h5>
          </div>

          <div class="flex flex-col p-2">
            <!-- Checklist Checkboxes -->
            <div v-if="cat.type === 'checklist'" v-for="item in cat.items" :key="item.name" class="flex items-center px-4 py-3.5 hover:bg-slate-50/50 border-b border-slate-100 last:border-none transition-colors">
              <label class="flex items-center gap-3 cursor-pointer select-none w-full">
                <div class="relative flex items-center justify-center">
                  <input type="checkbox" v-model="item.checked" class="peer appearance-none w-5 h-5 border-2 border-slate-300 rounded focus:ring-4 focus:ring-blue-500/20 checked:bg-blue-600 checked:border-blue-600 transition-all cursor-pointer">
                  <svg class="absolute w-3.5 h-3.5 text-white opacity-0 peer-checked:opacity-100 pointer-events-none transition-opacity" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5"/>
                  </svg>
                </div>
                <span class="text-xs font-bold text-slate-700 peer-checked:text-slate-900">{{ item.name }}</span>
              </label>
            </div>

            <!-- In/Out Inputs (Linen) -->
            <div v-if="cat.type === 'inout'" v-for="item in cat.items" :key="item.name" class="flex flex-col sm:flex-row sm:items-center justify-between gap-2.5 px-4 py-3.5 border-b border-slate-100 last:border-none">
              <span class="text-xs font-bold text-slate-700">{{ item.name }}</span>
              <div class="flex items-center gap-4">
                <div class="flex items-center gap-1.5">
                  <span class="text-[10px] text-slate-400 font-bold uppercase">Kotor Out:</span>
                  <input type="number" v-model.number="item.out" class="w-16 h-[32px] text-center border border-slate-200 rounded-lg text-xs font-bold" min="0">
                </div>
                <div class="flex items-center gap-1.5">
                  <span class="text-[10px] text-slate-400 font-bold uppercase">Bersih In:</span>
                  <input type="number" v-model.number="item.in" class="w-16 h-[32px] text-center border border-slate-200 rounded-lg text-xs font-bold" min="0">
                </div>
              </div>
            </div>

            <!-- In Inputs (Refill) -->
            <div v-if="cat.type === 'in'" v-for="item in cat.items" :key="item.name" class="flex items-center justify-between gap-2.5 px-4 py-3.5 border-b border-slate-100 last:border-none">
              <span class="text-xs font-bold text-slate-700">{{ item.name }}</span>
              <div class="flex items-center gap-1.5">
                <span class="text-[10px] text-slate-400 font-bold uppercase">Refill Qty:</span>
                <input type="number" v-model.number="item.in" class="w-16 h-[32px] text-center border border-slate-200 rounded-lg text-xs font-bold" min="0">
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Remarks / Notes -->
      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-bold text-slate-700">Catatan Pengerjaan</label>
        <textarea v-model="selectedAreaTask.remarks" placeholder="Tuliskan keterangan jika ada kendala atau informasi tambahan..." rows="3" class="w-full bg-white border border-slate-200 rounded-2xl p-4 text-xs font-semibold focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all outline-none resize-none shadow-sm"></textarea>
      </div>

      <!-- Submit -->
      <button @click="submitAreaChecklistReport" class="h-[46px] w-full bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-black text-sm shadow-lg shadow-indigo-500/20 border-none transition-all active:scale-95 cursor-pointer shrink-0">
        Kirim Laporan Area
      </button>
    </div>
  </div>

  <!-- Fallback Views -->
  <div v-else class="flex-1 flex flex-col bg-slate-50">
    <div class="bg-primary-navy px-4 py-4 flex items-center gap-3 text-white shadow-md z-10 relative">
      <button @click="currentView = 'dashboard'" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <h2 class="text-lg font-bold">
        {{ currentView === 'housekeeping-projects' ? 'HouseKeeping Project' : 
           currentView === 'staff-projects' ? 'Proyek Staff' : 
           currentView === 'inventory' ? 'Inventaris' : 'Pengajuan Izin' }}
      </h2>
    </div>
    
    <!-- Placeholder Content -->
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
      <div class="w-24 h-24 mb-4 text-slate-300 flex items-center justify-center">
        <!-- SVG Placeholder -->
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-700 mb-2">Dalam Pengerjaan</h3>
      <p class="text-sm text-slate-500">Fitur ini sedang dibangun dan akan segera hadir pada iterasi berikutnya.</p>
    </div>
  </div>

    <!-- Global Toast Alert (Fixed bottom corner) -->
    <div class="fixed bottom-5 left-1/2 -translate-x-1/2 z-[99999] flex flex-col gap-2 pointer-events-none w-full max-w-[320px] px-6" v-if="toast.show">
      <div :class="['px-5 py-3.5 rounded-lg text-white text-[13px] font-semibold shadow-lg flex items-center justify-center gap-2.5 pointer-events-auto transition-all animate-[slideIn_0.3s_ease] text-center w-full', 
        toast.type === 'pending' ? 'bg-slate-800 border-l-4 border-blue-500' : 
        toast.type === 'success' ? 'bg-emerald-500' : 
        toast.type === 'error' ? 'bg-rose-500' : 
        'bg-slate-900']">
        <span>{{ toast.message }}</span>
      </div>
    </div>

  </template>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;

createApp({
  setup() {
    const isInitializing = ref(true);
    const currentView = ref('dashboard');
    const currentTime = ref('');
    const currentDate = ref('');
    
    // Live update for clock time
    let timerId;
    const updateTime = () => {
      const now = new Date();
      currentTime.value = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      currentDate.value = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    };

    // Session Protection & Sync on Mount
    onMounted(async () => {
      const loggedIn = await checkAutoLogin();
      isInitializing.value = false;

      // Force redirect if not staff
      if (!loggedIn || !appState.currentUser || appState.currentUser.role !== 'staff') {
        const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");
        if (isGAS) {
          window.location.href = GAS_URL;
        } else {
          window.location.href = "index.html";
        }
      } else {
        // Start live time updates
        updateTime();
        timerId = setInterval(updateTime, 1000);
      }
    });

    const toast = computed(() => appState.toast);

    onUnmounted(() => {
      if (timerId) clearInterval(timerId);
      if (intervalTimer) clearInterval(intervalTimer);
    });

    // Reactive State Mapping
    const currentUser = computed(() => {
      return appState.currentUser || { name: 'Staf' };
    });

    const currentShift = computed(() => {
      if (!appState.currentUser || !appState.currentUser.shift_id) {
        return { name: 'Tidak Ada Shift', check_in_time: '--:--', check_out_time: '--:--' };
      }
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      return sh ? {
        shift_id: sh.shift_id,
        name: 'Shift ' + sh.shift_name,
        check_in_time: sh.check_in_time,
        check_out_time: sh.check_out_time
      } : { name: 'Shift Tidak Valid', check_in_time: '--:--', check_out_time: '--:--' };
    });

    // Date formatting for Jakarta Timezone
    const todayStr = computed(() => {
      const tz = 'Asia/Jakarta';
      const formatter = new Intl.DateTimeFormat('en-US', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit' });
      const parts = formatter.formatToParts(new Date());
      const year = parts.find(p => p.type === 'year').value;
      const month = parts.find(p => p.type === 'month').value;
      const day = parts.find(p => p.type === 'day').value;
      return `${year}-${month}-${day}`;
    });

    const todayAttendanceRecord = computed(() => {
      if (!appState.currentUser) return null;
      return appState.attendance.find(a => a.user_id === appState.currentUser.user_id && a.date === todayStr.value);
    });

    const attendanceStatus = computed(() => {
      const rec = todayAttendanceRecord.value;
      if (!rec) return 'Absensi Belum Dibuat';
      if (rec.status === 'belum_absen') return 'Belum Absen';
      if (rec.status === 'pending') return 'Sudah Clock-In (Pending)';
      if (rec.status === 'hadir') return 'Sudah Absen (Hadir)';
      if (rec.status === 'terlambat') return 'Sudah Absen (Terlambat)';
      if (rec.status === 'alpha') return 'Alpha';
      return 'Belum Absen';
    });

    const hasActiveLeaveToday = computed(() => {
      if (!appState.currentUser) return false;
      return appState.leave_requests.some(r => 
        r.user_id === appState.currentUser.user_id && 
        (r.status === 'approved' || r.status === 'pending') &&
        todayStr.value >= String(r.start_date).substring(0, 10) && 
        todayStr.value <= String(r.end_date).substring(0, 10)
      );
    });

    const timeToMinutes = (timeStr) => {
      const cleanTime = String(timeStr).replace('.', ':');
      const parts = cleanTime.split(':');
      return parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
    };

    const minutesToTime = (mins) => {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0');
    };

    const earliestClockInTime = computed(() => {
      if (!currentShift.value || !currentShift.value.check_in_time) return '--:--';
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      const preIn = sh ? (parseInt(sh.pre_check_in_minutes, 10) || 0) : 0;
      const inMins = timeToMinutes(currentShift.value.check_in_time);
      let earliestMins = inMins - preIn;
      if (earliestMins < 0) earliestMins += 1440;
      return minutesToTime(earliestMins);
    });

    const earliestClockOutTime = computed(() => {
      if (!currentShift.value || !currentShift.value.check_out_time) return '--:--';
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      const preOut = sh ? (parseInt(sh.pre_check_out_minutes, 10) || 0) : 0;
      const outMins = timeToMinutes(currentShift.value.check_out_time);
      let earliestMins = outMins - preOut;
      if (earliestMins < 0) earliestMins += 1440;
      return minutesToTime(earliestMins);
    });

    const checkClockInWindow = () => {
      if (!currentShift.value || !currentShift.value.check_in_time) {
        return { allowed: false };
      }
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      const currentMins = timeToMinutes(timeStr);
      
      const shiftInMins = timeToMinutes(currentShift.value.check_in_time);
      const shiftOutMins = timeToMinutes(currentShift.value.check_out_time);
      
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      const preMins = sh ? (parseInt(sh.pre_check_in_minutes, 10) || 0) : 0;
      
      let startMins = shiftInMins - preMins;
      if (startMins < 0) startMins += 1440;
      
      let allowed = false;
      if (startMins <= shiftOutMins) {
        allowed = (currentMins >= startMins && currentMins <= shiftOutMins);
      } else {
        allowed = (currentMins >= startMins || currentMins <= shiftOutMins);
      }
      
      return { allowed: allowed };
    };

    const checkClockOutWindow = () => {
      if (!currentShift.value || !currentShift.value.check_out_time) {
        return { allowed: true };
      }
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      const currentMins = timeToMinutes(timeStr);
      
      const shiftInMins = timeToMinutes(currentShift.value.check_in_time);
      const shiftOutMins = timeToMinutes(currentShift.value.check_out_time);
      
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      const preOutMins = sh ? (parseInt(sh.pre_check_out_minutes, 10) || 0) : 0;
      
      let startOutMins = shiftOutMins - preOutMins;
      if (startOutMins < 0) startOutMins += 1440;
      
      let allowed = false;
      if (shiftInMins <= shiftOutMins) {
        allowed = (currentMins >= startOutMins || currentMins < shiftInMins);
      } else {
        allowed = (currentMins >= startOutMins && currentMins < shiftInMins);
      }
      
      return { allowed: allowed };
    };

    const canClockIn = computed(() => {
      if (attendanceStatus.value !== 'Belum Absen') return false;
      if (hasActiveLeaveToday.value) return false;
      return true;
    });

    const toggleAttendance = async () => {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      
      if (attendanceStatus.value === 'Absensi Belum Dibuat') {
        Swal.fire({
          icon: 'error',
          title: 'Absensi Belum Dibuat',
          text: 'Data absensi harian belum di-generate oleh Manager/Admin. Harap hubungi Manager untuk memproses data harian.',
          confirmButtonColor: '#EF4444'
        });
        return;
      }

      if (attendanceStatus.value === 'Belum Absen') {
        if (hasActiveLeaveToday.value) {
          Swal.fire({
            icon: 'error',
            title: 'Absen Masuk Ditolak',
            text: 'Anda memiliki izin/cuti aktif untuk tanggal hari ini.',
            confirmButtonColor: '#EF4444'
          });
          return;
        }

        // Validate shift check-in window
        const win = checkClockInWindow();
        if (!win.allowed) {
          const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
          const startStr = minutesToTime((timeToMinutes(sh.check_in_time) - (parseInt(sh.pre_check_in_minutes, 10) || 0) + 1440) % 1440);
          
          Swal.fire({
            icon: 'warning',
            title: 'Di Luar Jadwal Absensi',
            html: `
              <div class="text-left text-xs space-y-2.5 font-sans leading-relaxed text-slate-600 bg-slate-50 p-4.5 rounded-2xl border border-slate-100">
                <div><strong class="text-slate-800">Shift Anda:</strong> ${currentShift.value.name} (${currentShift.value.check_in_time} - ${currentShift.value.check_out_time})</div>
                <div><strong class="text-slate-800">Waktu Minimal Absen Masuk:</strong> ${startStr} (${sh.pre_check_in_minutes} menit sebelum shift)</div>
                <div><strong class="text-slate-800">Batas Akhir Absen Masuk:</strong> ${currentShift.value.check_out_time} (Akhir shift)</div>
                <div class="border-t border-slate-200/60 pt-2.5 mt-2.5"><strong class="text-slate-800">Pukul Sekarang:</strong> ${timeStr}</div>
                <div class="text-red-500 font-bold mt-1">⚠️ Absen masuk ditolak karena berada di luar waktu pengerjaan shift Anda.</div>
              </div>
            `,
            confirmButtonText: 'Saya Mengerti',
            confirmButtonColor: '#2563EB'
          });
          return;
        }

        const success = await clockInUser(currentShift.value.shift_id, timeStr, todayStr.value);
        if (success) {
          Swal.fire('Berhasil', 'Waktu kehadiran Clock-In Anda telah dicatat (Pending).', 'success');
        }
      } else if (attendanceStatus.value === 'Sudah Clock-In (Pending)') {
        // Validate shift clock-out window
        const winOut = checkClockOutWindow();
        if (!winOut.allowed) {
          const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
          const startOutStr = minutesToTime((timeToMinutes(sh.check_out_time) - (parseInt(sh.pre_check_out_minutes, 10) || 0) + 1440) % 1440);
          
          Swal.fire({
            icon: 'warning',
            title: 'Belum Waktunya Pulang',
            html: `
              <div class="text-left text-xs space-y-2.5 font-sans leading-relaxed text-slate-600 bg-slate-50 p-4.5 rounded-2xl border border-slate-100">
                <div><strong class="text-slate-800">Shift Anda:</strong> ${currentShift.value.name} (${currentShift.value.check_in_time} - ${currentShift.value.check_out_time})</div>
                <div><strong class="text-slate-800">Waktu Minimal Absen Pulang:</strong> ${startOutStr} (${sh.pre_check_out_minutes} menit sebelum shift berakhir)</div>
                <div class="border-t border-slate-200/60 pt-2.5 mt-2.5"><strong class="text-slate-800">Pukul Sekarang:</strong> ${timeStr}</div>
                <div class="text-red-500 font-bold mt-1">⚠️ Anda belum diperizinkan melakukan Clock-Out sebelum mencapai waktu minimal kepulangan.</div>
              </div>
            `,
            confirmButtonText: 'Saya Mengerti',
            confirmButtonColor: '#EF4444'
          });
          return;
        }

        Swal.fire({
          title: 'Clock Out?',
          text: "Anda yakin ingin menyelesaikan shift hari ini?",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#10B981',
          cancelButtonColor: '#d33',
          confirmButtonText: 'Ya, Clock Out'
        }).then(async (result) => {
          if (result.isConfirmed) {
            const success = await clockOutUser(timeStr, todayStr.value);
            if (success) {
              Swal.fire('Berhasil', 'Absensi pulang Anda telah dicatat. Shift hari ini selesai.', 'success');
            }
          }
        });
      }
    };

    const handleLogout = () => {
      Swal.fire({
        title: 'Keluar?',
        text: "Anda yakin ingin keluar dari sistem?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#1E3A8A',
        cancelButtonColor: '#EF4444',
        confirmButtonText: 'Ya, Keluar'
      }).then((result) => {
        if (result.isConfirmed) {
          logoutUser();
          const isGAS = window.location.hostname.includes("google.com") || window.location.hostname.includes("googleusercontent.com");
          if (isGAS) {
            window.location.href = GAS_URL;
          } else {
            window.location.href = "index.html";
          }
        }
      });
    };

    const navigate = (view) => {
      // Prevent entering pages if leave request blocks operasional
      if (view !== 'dashboard' && view !== 'leave' && attendanceStatus.value === 'Belum Absen') {
        Swal.fire("Akses Ditolak", "Anda harus melakukan Clock-In terlebih dahulu.", "warning");
        return;
      }
      currentView.value = view;
    };

    // --- Room Control Logic ---
    const statusDescriptions = {
      "OD": "Occupied Dirty",
      "OC": "Occupied Clean",
      "VD": "Vacant Dirty",
      "VC": "Vacant Clean",
      "VCI": "Vacant Clean Inspected",
      "ED": "Expected Departure",
      "EA": "Expected Arrival",
      "NS": "No Show",
      "RS": "Refused Service",
      "DND": "Do Not Disturb",
      "OOO": "Out of Order",
      "OOS": "Out of Service",
      "SO": "Sleep Out",
      "DL": "Double Lock",
      "NL": "No Luggage",
      "CO": "Check Out",
      "DO": "Due Out",
      "MUR": "Make Up Room",
      "VIP": "Very Important Person",
      "COMP": "Complimentary"
    };
    
    const getStatusName = (code) => {
      return statusDescriptions[code] || code;
    };

    const roomsList = computed(() => {
      return appState.rooms || [];
    });

    const isRoomCleanedToday = (roomNumber) => {
      return appState.room_checklist.some(c => String(c.room_number) === String(roomNumber) && c.date === todayStr.value);
    };

    const selectedRoom = ref(null);
    const targetRoomStatus = ref('VC');
    const roomTimer = ref(0);
    let intervalTimer = null;
    const isRoomTimerRunning = ref(false);

    const localChecklist = ref([]);
    const localRefills = ref([]);
    const localLinenIn = ref(0);
    const localLinenOut = ref(0);

    const roomControlTab = ref('rooms');
    const roomSearchQuery = ref('');
    const historySearchQuery = ref('');
    const targetRemarks = ref('');

    const filteredRoomsList = computed(() => {
      let list = roomsList.value || [];
      const query = roomSearchQuery.value.trim().toLowerCase();
      if (query) {
        list = list.filter(r => String(r.room_number).toLowerCase().includes(query) || (r.remarks && String(r.remarks).toLowerCase().includes(query)));
      }
      return list;
    });

    const filteredHistoryList = computed(() => {
      if (!appState.currentUser) return [];
      let list = appState.room_status_history.filter(h => h.changed_by === appState.currentUser.user_id);
      list.sort((x, y) => new Date(y.timestamp || 0) - new Date(x.timestamp || 0));
      
      const query = historySearchQuery.value.trim().toLowerCase();
      if (query) {
        list = list.filter(h => String(h.room_number).toLowerCase().includes(query) || String(h.new_status).toLowerCase().includes(query) || String(h.old_status).toLowerCase().includes(query));
      }
      return list;
    });

    const changeStatusDirectly = (room) => {
      Swal.fire({
        title: 'Ubah Status Kamar Langsung',
        html: `
          <div class="text-left text-xs text-slate-500 mb-4">
            Ubah status Kamar <b>${room.room_number}</b> secara langsung (Status Saat Ini: <b>${room.room_status}</b>)
          </div>
          <div class="text-left mb-3">
            <label class="block text-xs font-bold text-slate-400 uppercase mb-1">Status Baru</label>
            <select id="swal-new-status" class="w-full border border-slate-200 p-2.5 rounded-lg text-sm bg-white outline-none">
              <option value="OD" ${room.room_status === 'OD' ? 'selected' : ''}>OD - Occupied Dirty</option>
              <option value="OC" ${room.room_status === 'OC' ? 'selected' : ''}>OC - Occupied Clean</option>
              <option value="VD" ${room.room_status === 'VD' ? 'selected' : ''}>VD - Vacant Dirty</option>
              <option value="VC" ${room.room_status === 'VC' ? 'selected' : ''}>VC - Vacant Clean</option>
              <option value="VCI" ${room.room_status === 'VCI' ? 'selected' : ''}>VCI - Vacant Clean Inspected</option>

    const dataURLtoBlob = (dataurl, filename) => {
      const arr = dataurl.split(',');
      const mime = arr[0].match(/:(.*?);/)[1];
      const bstr = atob(arr[1]);
      let n = bstr.length;
      const u8arr = new Uint8Array(n);
      while (n--) {
        u8arr[n] = bstr.charCodeAt(n);
      }
      const blob = new Blob([u8arr], { type: mime });
      blob.name = filename;
      return blob;
    };

    });

    const filteredInventoryTransactions = computed(() => {
      let list = appState.inventory_transactions ? [...appState.inventory_transactions] : [];
      
      if (logCategoryFilter.value) {
        list = list.filter(t => {
          const item = getItemById(t.item_id);
          return item && item.category_id === logCategoryFilter.value;
        });
      }

      if (logRoomFilter.value) {
        list = list.filter(t => String(t.location_room).toLowerCase() === String(logRoomFilter.value).toLowerCase());
      }

      const now = new Date();
      if (logPeriodFilter.value === 'day') {
        const todayStr = now.toISOString().substring(0, 10);
        list = list.filter(t => t.date === todayStr);
      } else if (logPeriodFilter.value === 'week') {
        const oneWeekAgo = new Date();
        oneWeekAgo.setDate(now.getDate() - 7);
        list = list.filter(t => new Date(t.date) >= oneWeekAgo);
      } else if (logPeriodFilter.value === 'month') {
        const curYear = now.getFullYear();
        const curMonth = now.getMonth();
        list = list.filter(t => {
          const d = new Date(t.date);
          return d.getFullYear() === curYear && d.getMonth() === curMonth;
        });
      }
      
      if (logDateFilter.value) {
        list = list.filter(t => t.date === logDateFilter.value);
      }
      if (logMonthFilter.value) {
        list = list.filter(t => String(t.date).substring(0, 7) === logMonthFilter.value);
      }

      if (inventorySearchQuery.value) {
        const q = inventorySearchQuery.value.toLowerCase();
        list = list.filter(t => {
          const item = getItemById(t.item_id);
          const staff = getHkStaffName(t.user_id);
          return (
            (item && String(item.item_name).toLowerCase().includes(q)) ||
            (item && String(item.item_code).toLowerCase().includes(q)) ||
            String(t.remarks).toLowerCase().includes(q) ||
            String(t.location_room).toLowerCase().includes(q) ||
            staff.toLowerCase().includes(q)
          );
        });
      }
      
      list.sort((a, b) => new Date(b.timestamp || b.date) - new Date(a.timestamp || a.date));
      return list;
    });

    const loadTxDetailFields = (itemId) => {
      if (!itemId) {
        txDetailFields.value = [];
        return;
      }
      const item = getItemById(itemId);
      if (!item) {
        txDetailFields.value = [];
        return;
      }
      const details = safeParseJSON(item.detail_spesifik, {});
      const defaultAttrs = getCategoryDefaultAttrs(item.category_id);
      
      txDetailFields.value = defaultAttrs.map(attrName => ({
        name: attrName,
        value: details[attrName] !== undefined ? String(details[attrName]) : ''
      }));
      
      if (item.location_room && item.location_room !== 'Global') {
        directTx.value.locationRoom = item.location_room;
      } else {
        directTx.value.locationRoom = 'Global';
      }
    };

    // Watcher for directTx.item_id
    watch(() => directTx.value.item_id, (newVal) => {
      loadTxDetailFields(newVal);
    });

    const submitDirectTx = async () => {
      if (!directTx.value.item_id) {
        Swal.fire("Peringatan", "Silakan pilih barang terlebih dahulu.", "warning");
        return;
      }
      const todayStr = new Date().toISOString().substring(0, 10);
      
      let detailSpesifik = null;
      if (txDetailFields.value.length > 0) {
        const detailObj = {};
        txDetailFields.value.forEach(f => {
          if (f.name.trim()) {
            detailObj[f.name.trim()] = f.value;
          }
        });
        detailSpesifik = JSON.stringify(detailObj);
      }
      
      const success = await recordInventoryTxLocal(
        directTx.value.item_id, 
        directTx.value.type, 
        directTx.value.quantity, 
        todayStr, 
        directTx.value.remarks,
        detailSpesifik,
        directTx.value.locationRoom
      );
      
      if (success) {
        directTx.value.item_id = '';
        directTx.value.quantity = 1;
        directTx.value.remarks = '';
        txDetailFields.value = [];
        invActiveSubTab.value = 'history';
      }
    };

    // --- Public Area Control Setup ---
    const areaControlTab = ref('areas');
    const areaSearchQuery = ref('');
    const selectedAreaTask = ref(null);
    const areaChecklistUiCategories = ref([]);

    const myAssignedAreas = computed(() => {
      if (!appState.currentUser) return [];
      const myId = String(appState.currentUser.user_id);
      
      const assignments = (appState.staff_area_tasks || []).filter(t => 
        String(t.staff_id) === myId && 
        t.date === todayStr.value
      );
      
      const areaIds = Array.from(new Set(assignments.map(t => t.area_id)));
      let list = (appState.areas || []).filter(a => areaIds.includes(a.area_id));
      
      const q = areaSearchQuery.value.trim().toLowerCase();
      if (q) {
        list = list.filter(a => a.area_name.toLowerCase().includes(q) || (a.id_number && a.id_number.toLowerCase().includes(q)));
      }
      return list;
    });

    const myTodayAreaHistory = computed(() => {
      if (!appState.currentUser) return [];
      const myId = String(appState.currentUser.user_id);
      return (appState.area_tasks_daily || []).filter(t => 
        String(t.staff_id) === myId && 
        t.date === todayStr.value
      ).reverse();
    });

    const getAreaShiftsForUser = (areaId) => {
      if (!appState.currentUser) return [];
      const myId = String(appState.currentUser.user_id);
      
      const shiftIds = (appState.staff_area_tasks || [])
        .filter(t => String(t.staff_id) === myId && t.area_id === areaId && t.date === todayStr.value)
        .map(t => t.area_shift_id);
        
      return (appState.area_shifts || []).filter(s => shiftIds.includes(s.area_shift_id));
    };

    const getDailyTaskStatus = (areaId, areaShiftId) => {
      const report = (appState.area_tasks_daily || []).find(r => 
        r.area_id === areaId && 
        r.area_shift_id === areaShiftId && 
        r.date === todayStr.value
      );
      return report ? (report.status || 'Pending') : 'Pending';
    };

    const getDailyTaskStatusColor = (areaId, areaShiftId) => {
      const status = getDailyTaskStatus(areaId, areaShiftId).toLowerCase();
      return status === 'selesai' || status === 'completed' ? 'bg-emerald-500' : 'bg-amber-500';
    };

    const getDailyTaskStatusBadgeClass = (areaId, areaShiftId) => {
      const status = getDailyTaskStatus(areaId, areaShiftId).toLowerCase();
      return status === 'selesai' || status === 'completed' 
        ? 'bg-emerald-50 text-emerald-700 border-emerald-200' 
        : 'bg-amber-50 text-amber-700 border-amber-200';
    };

    const getAreaName = (id) => {
      const area = (appState.areas || []).find(a => a.area_id === id);
      return area ? area.area_name : id;
    };

    const getShiftName = (id) => {
      const shift = (appState.area_shifts || []).find(s => s.area_shift_id === id);
      return shift ? shift.shift_name : id;
    };

    const getUserName = (id) => {
      const user = (appState.users || []).find(u => u.user_id === id);
      return user ? user.name : id;
    };

    const openAreaChecklist = (area, shift) => {
      const existing = (appState.area_tasks_daily || []).find(r => 
        r.area_id === area.area_id && 
        r.area_shift_id === shift.area_shift_id && 
        r.date === todayStr.value
      );
      
      selectedAreaTask.value = {
        area: area,
        shift: shift,
        remarks: existing ? (existing.remarks || '') : ''
      };
      
      try {
        const config = JSON.parse(area.checklist_config || "{}");
        areaChecklistUiCategories.value = Object.keys(config).map(catName => {
          const cat = config[catName];
          const type = cat.type || 'checklist';
          
          let completedObj = {};
          if (existing && existing.tasks_completed) {
            completedObj = safeParseJSON(existing.tasks_completed, {});
          }
          const catVals = completedObj[catName] || {};

          const items = (cat.items || []).map(itemName => {
            if (type === 'checklist') {
              return { name: itemName, checked: catVals[itemName] === true };
            } else if (type === 'inout') {
              const val = catVals[itemName] || {};
              return { name: itemName, in: Number(val.in || 0), out: Number(val.out || 0) };
            } else { // 'in'
              const val = catVals[itemName] || {};
              return { name: itemName, in: Number(val.in || 0) };
            }
          });
          
          return {
            name: catName,
            type: type,
            items: items
          };
        });
      } catch (e) {
        areaChecklistUiCategories.value = [];
      }
    };

    const submitAreaChecklistReport = async () => {
      const task = selectedAreaTask.value;
      if (!task) return;
      
      const tasksCompleted = {};
      const linenChanged = [];
      const refills = [];
      
      areaChecklistUiCategories.value.forEach(cat => {
        tasksCompleted[cat.name] = {};
        if (cat.type === 'checklist') {
          cat.items.forEach(item => {
            tasksCompleted[cat.name][item.name] = item.checked === true;
          });
        } else if (cat.type === 'inout') {
          cat.items.forEach(item => {
            tasksCompleted[cat.name][item.name] = { in: Number(item.in || 0), out: Number(item.out || 0) };
            linenChanged.push({
              item: item.name,
              in: Number(item.in || 0),
              out: Number(item.out || 0)
            });
          });
        } else if (cat.type === 'in') {
          cat.items.forEach(item => {
            tasksCompleted[cat.name][item.name] = { in: Number(item.in || 0) };
            refills.push({
              name: item.name,
              qty: Number(item.in || 0)
            });
          });
        }
      });
      
      showLoading("Mengirim laporan area...");
      try {
        const success = await submitAreaTaskDailyLocal(
          task.area.area_id,
          task.shift.area_shift_id,
          todayStr.value,
          "selesai",
          task.remarks || "",
          tasksCompleted,
          linenChanged,
          refills
        );
        if (success) {
          selectedAreaTask.value = null;
        }
      } catch (err) {
        showToast("⚠️ Gagal mengirim: " + err.message, "error");
      }
    };

    return {
      isInitializing,
      currentView,
      handleLogout,
      toast,
      currentUser,
      currentShift,
      attendanceStatus,
      currentTime,
      currentDate,
      canClockIn,
      hasActiveLeaveToday,
      earliestClockInTime,
      earliestClockOutTime,
      checkClockInWindow,
      checkClockOutWindow,
      toggleAttendance,
      navigate,
      // Room Control
      roomsList,
      isRoomCleanedToday,
      selectedRoom,
      targetRoomStatus,
      roomTimer,
      isRoomTimerRunning,
      localChecklist,
      localRefills,
      localLinenIn,
      localLinenOut,
      completedChecklistCount,
      totalChecklistCount,
      checklistProgress,
      startCleaning,
      openRoomDetail,
      formatTimer,
      startRoomTimer,
      stopRoomTimer,
      roomControlTab,
      roomSearchQuery,
      historySearchQuery,
      targetRemarks,
      filteredRoomsList,
      filteredHistoryList,
      changeStatusDirectly,
      getStatusName,
      // Housekeeping
      hkActiveSubTab,
      showHkSubmitModal,
      hkSelectedProject,
      hkSubmissionDescription,
      hkImageFile,
      hkImagePreview,
      isHkLiveCameraOpen,
      activeHousekeepingProjects,
      myHousekeepingSubmissions,
      getProjectTitle,
      formatDateTime,
      triggerHkFileUpload,
      triggerHkCameraUpload,
      onHkProjectFileChange,
      openHkLiveCamera,
      closeHkLiveCamera,
      captureHkLivePhoto,
      removeHkProjectImage,
      openHkSubmitModal,
      closeHkSubmitModal,
      submitHkProject,
      // Staff Projects
      staffProjectsList,
      showAddStaffProject,
      newStaffProject,
      submitStaffProject,
      getDisplayPhotoUrl,
      projectImageFile,
      projectImagePreview,
      isLiveCameraOpen,
      triggerFileUpload,
      triggerCameraUpload,
      onProjectFileChange,
      openLiveCamera,
      closeLiveCamera,
      captureLivePhoto,
      removeProjectImage,
      // Misc
      submitLeave,
      // Area Control
      areaControlTab,
      areaSearchQuery,
      selectedAreaTask,
      areaChecklistUiCategories,
      myAssignedAreas,
      myTodayAreaHistory,
      getAreaShiftsForUser,
      getDailyTaskStatus,
      getDailyTaskStatusColor,
      getDailyTaskStatusBadgeClass,
      getAreaName,
      getShiftName,
      getUserName,
      openAreaChecklist,
      submitAreaChecklistReport,
      // Inventory System (Revisi)
      appState,
      invActiveSubTab,
      inventoryCategoryFilter,
      inventoryRoomFilter,
      inventorySearchQuery,
      logCategoryFilter,
      logRoomFilter,
      logPeriodFilter,
      logDateFilter,
      logMonthFilter,
      directTx,
      txDetailFields,
      getHkStaffName,
      getItemById,
      getCategoryName,
      getDetailValue,
      dynamicTableColumns,
      logDynamicTableColumns,
      sortedRoomsList,
      filteredInventoryItems,
      filteredInventoryTransactions,
      submitDirectTx
    };
  }
}).mount('#app');
</script>

</body>
</html>
