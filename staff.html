<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CleanSphere - Staff App</title>
  
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
      tailwind.config = {
          theme: {
              extend: {
                  colors: {
                      primary: {
                          navy: '#1E3A8A',
                          royal: '#2563EB',
                          dark: '#0F172A',
                          hover: '#1E293B'
                      },
                      accent: {
                          blue: '#3B82F6',
                          light: '#EFF6FF'
                      }
                  },
                  fontFamily: {
                      sans: ['Inter', 'sans-serif'],
                  }
              }
          }
      }
  </script>

  <!-- Vue 3 CDN -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <!-- Load data.js (State & Client APIs) -->
  <script src="data.js"></script>

  <style>
    body {
      background-color: #f1f5f9; /* slate-100 */
      /* Prevent pull-to-refresh on mobile */
      overscroll-behavior-y: none;
    }
    .app-container {
      max-width: 480px; /* Tablet/large phone width */
      margin: 0 auto;
      min-height: 100vh;
      background-color: #ffffff;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
      position: relative;
      overflow-x: hidden;
    }
    
    /* Smooth transitions for view switching */
    .fade-enter-active, .fade-leave-active {
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
    .fade-enter-from, .fade-leave-to {
      opacity: 0;
      transform: translateY(10px);
    }
  </style>
</head>
<body class="text-slate-800 antialiased font-sans">

<div id="app" class="app-container flex flex-col">
  
  <!-- Fullscreen Initial Loading Spinner -->
  <div class="fixed inset-0 bg-white flex flex-col justify-center items-center z-[9999] gap-4" v-if="isInitializing">
      <div class="w-12 h-12 border-4 border-slate-200 border-t-blue-600 rounded-full animate-spin"></div>
      <div class="text-[15px] font-semibold text-slate-700 tracking-tight">Memulihkan Sesi...</div>
  </div>

  <template v-else>
    <!-- =============================== -->
    <!-- 2. DASHBOARD VIEW               -->
    <!-- =============================== -->
    <div v-if="currentView === 'dashboard'" class="flex-1 flex flex-col bg-slate-50">
      <!-- Header -->
      <div class="bg-primary-navy pt-8 pb-16 px-6 relative rounded-b-[2.5rem] shadow-md z-10">
        <div class="flex justify-between items-center mb-6">
          <div class="text-white">
            <p class="text-sm text-blue-200">Selamat bekerja,</p>
            <h2 class="text-xl font-bold">{{ currentUser.name }}</h2>
          </div>
          <button @click="handleLogout" class="w-10 h-10 rounded-full bg-white/10 flex items-center justify-center text-white hover:bg-white/20 transition-colors">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
          </button>
        </div>
        <div class="text-center text-white">
          <div class="text-4xl font-bold tracking-tight mb-1">{{ currentTime }}</div>
          <div class="text-sm text-blue-200">{{ currentDate }}</div>
        </div>
      </div>
      
      <!-- Main Content Area (Overlaps header) -->
      <div class="px-6 -mt-8 relative z-20 flex-1 flex flex-col">
        <!-- Attendance Card -->
        <div class="bg-white rounded-2xl shadow-lg p-6 mb-6 border border-slate-100 flex flex-col items-center">
          <div class="w-full flex justify-between text-xs font-semibold text-slate-500 mb-6">
            <div class="text-center">
              <span class="block">Shift Anda</span>
              <span class="text-primary-navy">{{ currentShift.name }} ({{ currentShift.check_in_time }} - {{ currentShift.check_out_time }})</span>
            </div>
            <div class="text-center">
              <span class="block">Status</span>
              <span :class="attendanceStatus === 'Belum Absen' ? 'text-amber-500' : 'text-green-500'">{{ attendanceStatus }}</span>
            </div>
          </div>
          
          <!-- Giant Clock In / Out Button -->
          <button 
            @click="toggleAttendance" 
            :disabled="hasActiveLeaveToday"
            :class="['w-40 h-40 rounded-full flex flex-col items-center justify-center text-white transition-all duration-300 shadow-xl shadow-opacity-40 border-none cursor-pointer', 
              attendanceStatus === 'Belum Absen' 
                ? (hasActiveLeaveToday 
                    ? 'bg-slate-300 shadow-none cursor-not-allowed' 
                    : (!checkClockInWindow().allowed 
                        ? 'bg-gradient-to-tr from-amber-500 to-yellow-400 shadow-yellow-500/20 active:scale-95' 
                        : 'bg-gradient-to-tr from-blue-600 to-primary-royal shadow-blue-500/40 active:scale-95'))
                : (attendanceStatus === 'Sudah Clock-In (Pending)' 
                    ? 'bg-gradient-to-tr from-rose-500 to-rose-400 shadow-rose-500/40 active:scale-95' 
                    : 'bg-slate-300 shadow-none cursor-not-allowed')]">
            <svg class="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span class="font-bold text-lg">
              {{ 
                attendanceStatus === 'Belum Absen' ? (hasActiveLeaveToday ? 'Izin Aktif' : 'Clock In') :
                attendanceStatus === 'Sudah Clock-In (Pending)' ? 'Clock Out' : 'Selesai'
              }}
            </span>
            <span v-if="hasActiveLeaveToday" class="text-[10px] mt-1 font-medium bg-black/20 px-2 py-0.5 rounded-full">
              Izin Hari Ini
            </span>
            <span v-else-if="attendanceStatus === 'Belum Absen' && !checkClockInWindow().allowed" class="text-[10px] mt-1 font-medium bg-black/20 px-2 py-0.5 rounded-full">
              Di Luar Jadwal
            </span>
          </button>
        </div>
  
        <!-- Menu Grid -->
        <h3 class="text-sm font-bold text-slate-700 mb-3 px-1">Menu Operasional</h3>
        <div class="grid grid-cols-2 gap-3 mb-8">
          
          <button @click="navigate('room-control')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-blue-100 hover:border-blue-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-blue-50 text-primary-royal flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Room Control</span>
          </button>
  
          <button @click="navigate('area-control')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-indigo-100 hover:border-indigo-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-indigo-50 text-indigo-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Area Publik</span>
          </button>
  
          <button @click="navigate('housekeeping-projects')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-emerald-100 hover:border-emerald-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-emerald-50 text-emerald-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Proyek Rutin</span>
          </button>
  
          <button @click="navigate('staff-projects')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-purple-100 hover:border-purple-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-purple-50 text-purple-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Proyek Staff</span>
          </button>
  
          <button @click="navigate('inventory')" :disabled="attendanceStatus === 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus === 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-amber-100 hover:border-amber-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-amber-50 text-amber-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Pemakaian<br>Inventaris</span>
          </button>
  
          <button @click="navigate('leave')" :disabled="attendanceStatus !== 'Belum Absen'" :class="['flex flex-col items-center justify-center p-4 rounded-2xl border bg-white transition-all cursor-pointer', attendanceStatus !== 'Belum Absen' ? 'opacity-50 border-slate-200 cursor-not-allowed' : 'border-rose-100 hover:border-rose-300 hover:shadow-md active:scale-95 shadow-sm']">
            <div class="w-12 h-12 rounded-full bg-rose-50 text-rose-600 flex items-center justify-center mb-3">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
            </div>
            <span class="text-[13px] font-semibold text-slate-700 text-center leading-tight">Pengajuan<br>Izin / Cuti</span>
          </button>
  
        </div>
      </div>
    </div>

  <!-- =============================== -->
  <!-- 3. ROOM CONTROL VIEW            -->
  <!-- =============================== -->
  <div v-else-if="currentView === 'room-control'" class="flex-1 flex flex-col bg-slate-50 relative">
    <div class="bg-gradient-to-r from-primary-navy to-primary-royal px-5 py-5 flex items-center gap-4 text-white shadow-xl shadow-blue-900/10 z-10 relative rounded-b-3xl mb-2">
      <button @click="currentView = 'dashboard'" class="w-10 h-10 rounded-full bg-white/20 backdrop-blur-md flex items-center justify-center hover:bg-white/30 transition-all active:scale-95 shadow-inner">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <div>
        <h2 class="text-xl font-extrabold tracking-wide">Room Control</h2>
        <p class="text-blue-100 text-xs font-medium">Manajemen Pembersihan Kamar</p>
      </div>
    </div>

    <!-- Room List -->
    <div v-if="!selectedRoom" class="p-5 flex-1 overflow-y-auto">
      <div class="flex items-center justify-between mb-4">
        <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Daftar Semua Kamar</p>
        <span class="bg-blue-100 text-blue-700 text-[10px] font-bold px-2.5 py-1 rounded-full">{{ roomsList.length }} Kamar</span>
      </div>
      
      <div class="flex flex-col gap-4">
        <div v-for="room in roomsList" :key="room.room_number" @click="openRoomDetail(room)" class="group bg-white rounded-2xl p-5 shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-slate-100 active:scale-[0.98] transition-all duration-300 cursor-pointer relative overflow-hidden flex justify-between items-center hover:shadow-[0_8px_30px_rgb(0,0,0,0.08)] hover:border-blue-100">
          <div :class="['absolute top-0 left-0 w-1.5 h-full transition-colors', isRoomCleanedToday(room.room_number) ? 'bg-emerald-500' : 'bg-gradient-to-b from-amber-400 to-orange-400']"></div>
          
          <div class="flex items-center gap-4 pl-2">
            <div :class="['w-12 h-12 rounded-full flex items-center justify-center text-lg font-black shadow-inner', isRoomCleanedToday(room.room_number) ? 'bg-emerald-50 text-emerald-600' : 'bg-slate-50 text-slate-700 group-hover:bg-blue-50 group-hover:text-blue-600 transition-colors']">
              {{ room.room_number }}
            </div>
            <div>
              <p class="text-[10px] text-slate-400 font-medium flex items-center gap-1 mb-0.5 uppercase tracking-wide">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                Target Ideal: {{ room.ideal_timer_minutes || 30 }} Menit
              </p>
              <h3 class="font-bold text-slate-700 text-sm">Status: {{ isRoomCleanedToday(room.room_number) ? 'Selesai (VC)' : 'Kotor (' + room.room_status + ')' }}</h3>
            </div>
          </div>
          
          <div class="text-right flex flex-col items-end gap-2">
            <span :class="['px-3 py-1 rounded-full text-[10px] font-extrabold uppercase tracking-wider', isRoomCleanedToday(room.room_number) ? 'bg-emerald-100 text-emerald-700 shadow-sm shadow-emerald-100' : 'bg-amber-100 text-amber-700 shadow-sm shadow-amber-100']">
              {{ isRoomCleanedToday(room.room_number) ? 'Selesai' : 'Tertunda' }}
            </span>
            <svg class="w-5 h-5 text-slate-300 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Room Detail (Timer & Checklist) -->
    <div v-else class="flex-1 flex flex-col bg-slate-50 animate-[fadeIn_0.2s_ease-out]">
      <!-- Sticky Detail Header -->
      <div class="bg-white px-5 py-4 border-b border-slate-100 shadow-sm flex justify-between items-center z-10 sticky top-0">
        <div>
          <button @click="selectedRoom = null" class="text-[13px] font-bold text-slate-400 hover:text-primary-royal flex items-center gap-1.5 transition-colors mb-1 border-none bg-transparent cursor-pointer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Kembali
          </button>
          <div class="flex items-center gap-2">
            <h3 class="font-black text-slate-800 text-2xl">Kamar {{ selectedRoom.room_number }}</h3>
            <span v-if="isRoomCleanedToday(selectedRoom.room_number)" class="bg-emerald-500 text-white w-5 h-5 rounded-full flex items-center justify-center">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>
            </span>
          </div>
        </div>
        <div class="bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 text-right min-w-[100px]">
          <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-0.5">Durasi</p>
          <p :class="['text-xl font-mono font-bold transition-colors', isRoomTimerRunning ? 'text-primary-royal animate-pulse' : 'text-slate-700']">
            {{ formatTimer(roomTimer) }}
          </p>
        </div>
      </div>

      <!-- Scrollable Content -->
      <div class="flex-1 overflow-y-auto p-5 pb-24" :class="{'opacity-60 grayscale-[30%] pointer-events-none transition-all duration-500': !isRoomTimerRunning && !isRoomCleanedToday(selectedRoom.room_number)}">
        
        <!-- Checklist Section -->
        <div class="mb-8" v-if="localChecklist.length > 0">
          <div class="flex justify-between items-end mb-4">
            <h4 class="text-sm font-extrabold text-slate-700">Tugas Pembersihan</h4>
            <span class="text-xs font-bold text-slate-400">{{ completedChecklistCount }}/{{ totalChecklistCount }} Selesai</span>
          </div>
          
          <!-- Progress Bar -->
          <div class="w-full bg-slate-200 rounded-full h-2 mb-5 overflow-hidden">
            <div class="bg-gradient-to-r from-blue-500 to-primary-royal h-2 rounded-full transition-all duration-500 ease-out" :style="{ width: checklistProgress + '%' }"></div>
          </div>

          <div class="flex flex-col gap-5">
            <div v-for="cat in localChecklist" :key="cat.category" class="bg-white rounded-xl p-4 border border-slate-100 shadow-[0_4px_20px_rgba(0,0,0,0.01)] flex flex-col gap-3">
              <h5 class="text-[11.5px] font-bold text-slate-400 uppercase tracking-wider">{{ cat.category }} ({{ cat.type }})</h5>
              <div class="flex flex-col gap-2">
                <label v-for="(task, i) in cat.items" :key="i" :class="['flex items-center gap-3 p-3.5 rounded-xl border transition-all cursor-pointer', task.done ? 'bg-blue-50/20 border-blue-200' : 'bg-slate-50/40 border-slate-100']">
                  <div class="relative flex items-center justify-center shrink-0">
                    <input type="checkbox" v-model="task.done" class="peer appearance-none w-5.5 h-5.5 border-2 border-slate-300 rounded-lg checked:border-blue-600 checked:bg-blue-600 transition-all cursor-pointer">
                    <svg class="absolute w-3.5 h-3.5 text-white pointer-events-none opacity-0 peer-checked:opacity-100 peer-checked:scale-100 scale-50 transition-all duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 13l4 4L19 7"></path></svg>
                  </div>
                  <span class="text-xs font-bold transition-colors leading-tight" :class="task.done ? 'text-slate-500 line-through opacity-70' : 'text-slate-600'">{{ task.name }}</span>
                </label>
              </div>
            </div>
          </div>
        </div>

        <!-- Stok Inventaris Dalam Kamar -->
        <div class="mb-8" v-if="localRoomInventory.length > 0">
          <h4 class="text-sm font-extrabold text-slate-700 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Refill & Update Stok Kamar
          </h4>
          <div class="flex flex-col gap-3">
            <div v-for="(item, j) in localRoomInventory" :key="j" class="flex items-center justify-between bg-white p-4 rounded-xl shadow-sm border border-slate-100">
              <div class="flex flex-col">
                <span class="text-[13px] font-bold text-slate-700">{{ item.name }}</span>
                <span class="text-[10px] font-semibold text-slate-400">Min. Stok: {{ item.min_qty || 0 }}</span>
              </div>
              <div class="flex items-center gap-3">
                <button @click="updateRoomInventoryStaff(j, -1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-black hover:bg-slate-200 active:scale-95 transition-all border-none cursor-pointer flex items-center justify-center">-</button>
                <span class="w-8 text-center font-black text-lg text-primary-navy">{{ item.qty }}</span>
                <button @click="updateRoomInventoryStaff(j, 1)" class="w-8 h-8 rounded-full bg-slate-100 text-slate-600 font-black hover:bg-slate-200 active:scale-95 transition-all border-none cursor-pointer flex items-center justify-center">+</button>
              </div>
            </div>
          </div>
        </div>

        <!-- Linen Section -->
        <div class="mb-8 bg-white p-5 rounded-2xl shadow-sm border border-slate-100">
          <h4 class="text-sm font-extrabold text-slate-700 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
            Pencatatan Linen
          </h4>
          <div class="grid grid-cols-2 gap-5">
            <div class="bg-slate-50 p-4 rounded-xl border border-slate-100">
              <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-wide">Linen In <span class="text-[10px] lowercase font-normal">(Bersih)</span></label>
              <div class="relative">

    <div class="bg-primary-navy px-4 py-4 flex items-center gap-3 text-white shadow-md z-10 relative">
      <button @click="currentView = 'dashboard'" class="w-8 h-8 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
      </button>
      <h2 class="text-lg font-bold">
        {{ currentView === 'area-control' ? 'Area Publik' : 
           currentView === 'housekeeping-projects' ? 'Proyek Rutin' : 
           currentView === 'staff-projects' ? 'Proyek Staff' : 
           currentView === 'inventory' ? 'Inventaris' : 'Pengajuan Izin' }}
      </h2>
    </div>
    
    <!-- Placeholder Content -->
    <div class="flex-1 flex flex-col items-center justify-center p-8 text-center">
      <div class="w-24 h-24 mb-4 text-slate-300 flex items-center justify-center">
        <!-- SVG Placeholder -->
        <svg class="w-16 h-16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path>
        </svg>
      </div>
      <h3 class="text-lg font-bold text-slate-700 mb-2">Dalam Pengerjaan</h3>
      <p class="text-sm text-slate-500">Fitur ini sedang dibangun dan akan segera hadir pada iterasi berikutnya.</p>
    </div>
  </div>

  </template>
</div>

<script>
const { createApp, ref, computed, onMounted, onUnmounted, watch } = Vue;

createApp({
  setup() {
    const isInitializing = ref(true);
    const currentView = ref('dashboard');
    const currentTime = ref('');
    const currentDate = ref('');
    
    // Live update for clock time
    let timerId;
    const updateTime = () => {
      const now = new Date();
      currentTime.value = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });
      currentDate.value = now.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
    };

    // Session Protection & Sync on Mount
    onMounted(async () => {
      const token = localStorage.getItem("cs_session_token");
      if (!token) {
        Swal.fire({
          icon: 'error',
          title: 'Akses Ditolak',
          text: 'Harap masuk terlebih dahulu.',
          confirmButtonColor: '#1E3A8A'
        }).then(() => {
          window.location.href = 'index.html';
        });
        return;
      }

      const loggedIn = await checkAutoLogin();
      if (loggedIn && appState.currentUser && appState.currentUser.role === 'staff') {
        await fetchDataFromServer();
        isInitializing.value = false;
        
        // Start live time updates
        updateTime();
        timerId = setInterval(updateTime, 1000);
      } else {
        localStorage.removeItem("cs_session_token");
        Swal.fire({
          icon: 'error',
          title: 'Akses Ditolak',
          text: 'Sesi Anda tidak valid atau Anda bukan staf.',
          confirmButtonColor: '#1E3A8A'
        }).then(() => {
          window.location.href = 'index.html';
        });
      }
    });

    onUnmounted(() => {
      if (timerId) clearInterval(timerId);
      if (intervalTimer) clearInterval(intervalTimer);
    });

    // Reactive State Mapping
    const currentUser = computed(() => {
      return appState.currentUser || { name: 'Staf' };
    });

    const currentShift = computed(() => {
      if (!appState.currentUser || !appState.currentUser.shift_id) {
        return { name: 'Tidak Ada Shift', check_in_time: '--:--', check_out_time: '--:--' };
      }
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      return sh ? {
        shift_id: sh.shift_id,
        name: 'Shift ' + sh.shift_name,
        check_in_time: sh.check_in_time,
        check_out_time: sh.check_out_time
      } : { name: 'Shift Tidak Valid', check_in_time: '--:--', check_out_time: '--:--' };
    });

    // Date formatting for Jakarta Timezone
    const todayStr = computed(() => {
      const tz = 'Asia/Jakarta';
      const formatter = new Intl.DateTimeFormat('en-US', { timeZone: tz, year: 'numeric', month: '2-digit', day: '2-digit' });
      const parts = formatter.formatToParts(new Date());
      const year = parts.find(p => p.type === 'year').value;
      const month = parts.find(p => p.type === 'month').value;
      const day = parts.find(p => p.type === 'day').value;
      return `${year}-${month}-${day}`;
    });

    const todayAttendanceRecord = computed(() => {
      if (!appState.currentUser) return null;
      return appState.attendance.find(a => a.user_id === appState.currentUser.user_id && a.date === todayStr.value);
    });

    const attendanceStatus = computed(() => {
      const rec = todayAttendanceRecord.value;
      if (!rec) return 'Belum Absen';
      if (rec.status === 'pending') return 'Sudah Clock-In (Pending)';
      if (rec.status === 'hadir') return 'Sudah Absen (Hadir)';
      if (rec.status === 'terlambat') return 'Sudah Absen (Terlambat)';
      if (rec.status === 'alpha') return 'Alpha';
      return 'Belum Absen';
    });

    const hasActiveLeaveToday = computed(() => {
      if (!appState.currentUser) return false;
      return appState.leave_requests.some(r => 
        r.user_id === appState.currentUser.user_id && 
        (r.status === 'approved' || r.status === 'pending') &&
        todayStr.value >= String(r.start_date).substring(0, 10) && 
        todayStr.value <= String(r.end_date).substring(0, 10)
      );
    });

    const timeToMinutes = (timeStr) => {
      const parts = timeStr.split(':');
      return parseInt(parts[0], 10) * 60 + parseInt(parts[1], 10);
    };

    const minutesToTime = (mins) => {
      const h = Math.floor(mins / 60);
      const m = mins % 60;
      return String(h).padStart(2, '0') + ":" + String(m).padStart(2, '0');
    };

    const checkClockInWindow = () => {
      if (!currentShift.value || !currentShift.value.check_in_time) {
        return { allowed: false, reason: "Data shift tidak ditemukan." };
      }
      
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      const currentMins = timeToMinutes(timeStr);
      
      const shiftInMins = timeToMinutes(currentShift.value.check_in_time);
      const shiftOutMins = timeToMinutes(currentShift.value.check_out_time);
      
      const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
      const preMins = sh ? (parseInt(sh.pre_check_in_minutes, 10) || 0) : 0;
      
      let startMins = shiftInMins - preMins;
      if (startMins < 0) startMins += 1440;
      
      let allowed = false;
      if (startMins <= shiftOutMins) {
        allowed = (currentMins >= startMins && currentMins <= shiftOutMins);
      } else {
        allowed = (currentMins >= startMins || currentMins <= shiftOutMins);
      }
      
      return { allowed: allowed };
    };

    const canClockIn = computed(() => {
      if (attendanceStatus.value !== 'Belum Absen') return false;
      if (hasActiveLeaveToday.value) return false;
      return true;
    });

    const toggleAttendance = async () => {
      const now = new Date();
      const timeStr = now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Asia/Jakarta' });
      
      if (attendanceStatus.value === 'Belum Absen') {
        if (hasActiveLeaveToday.value) {
          Swal.fire({
            icon: 'error',
            title: 'Absen Masuk Ditolak',
            text: 'Anda memiliki izin/cuti aktif untuk tanggal hari ini.',
            confirmButtonColor: '#EF4444'
          });
          return;
        }

        // Validate shift check-in window
        const win = checkClockInWindow();
        if (!win.allowed) {
          const sh = appState.shifts.find(s => s.shift_id === appState.currentUser.shift_id);
          const startStr = minutesToTime((timeToMinutes(sh.check_in_time) - (parseInt(sh.pre_check_in_minutes, 10) || 0) + 1440) % 1440);
          
          Swal.fire({
            icon: 'warning',
            title: 'Di Luar Jadwal Absensi',
            html: `
              <div class="text-left text-xs space-y-2.5 font-sans leading-relaxed text-slate-600 bg-slate-50 p-4.5 rounded-2xl border border-slate-100">
                <div><strong class="text-slate-800">Shift Anda:</strong> ${currentShift.value.name} (${currentShift.value.check_in_time} - ${currentShift.value.check_out_time})</div>
                <div><strong class="text-slate-800">Batas Awal Absen:</strong> ${startStr} (Toleransi ${sh.pre_check_in_minutes} menit sebelum shift)</div>
                <div><strong class="text-slate-800">Batas Akhir Absen:</strong> ${currentShift.value.check_out_time} (Akhir shift)</div>
                <div class="border-t border-slate-200/60 pt-2.5 mt-2.5"><strong class="text-slate-800">Pukul Sekarang:</strong> ${timeStr}</div>
                <div class="text-red-500 font-bold mt-1">⚠️ Absen masuk ditolak karena berada di luar waktu pengerjaan shift Anda.</div>
              </div>
            `,
            confirmButtonText: 'Saya Mengerti',
            confirmButtonColor: '#2563EB'
          });
          return;
        }

        const success = await clockInUser(currentShift.value.shift_id, timeStr, todayStr.value);
        if (success) {
          Swal.fire('Berhasil', 'Waktu kehadiran Clock-In Anda telah dicatat (Pending).', 'success');
        }
      } else if (attendanceStatus.value === 'Sudah Clock-In (Pending)') {
        Swal.fire({
          title: 'Clock Out?',
          text: "Anda yakin ingin menyelesaikan shift hari ini?",
          icon: 'warning',
          showCancelButton: true,
          confirmButtonColor: '#10B981',
          cancelButtonColor: '#d33',
          confirmButtonText: 'Ya, Clock Out'
        }).then(async (result) => {
          if (result.isConfirmed) {
            const success = await clockOutUser(timeStr, todayStr.value);
            if (success) {
              Swal.fire('Berhasil', 'Absensi pulang Anda telah dicatat. Shift hari ini selesai.', 'success');
            }
          }
        });
      }
    };

    const handleLogout = () => {
      Swal.fire({
        title: 'Keluar?',
        text: "Anda yakin ingin keluar dari sistem?",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#1E3A8A',
        cancelButtonColor: '#EF4444',
        confirmButtonText: 'Ya, Keluar'
      }).then((result) => {
        if (result.isConfirmed) {
          logoutUser();
        }
      });
    };

    const navigate = (view) => {
      // Prevent entering pages if leave request blocks operasional
      if (view !== 'dashboard' && view !== 'leave' && attendanceStatus.value === 'Belum Absen') {
        Swal.fire("Akses Ditolak", "Anda harus melakukan Clock-In terlebih dahulu.", "warning");
        return;
      }
      currentView.value = view;
    };

    // --- Room Control Logic ---
    const roomsList = computed(() => {
      return appState.rooms || [];
    });

    const isRoomCleanedToday = (roomNumber) => {
      return appState.room_checklist.some(c => String(c.room_number) === String(roomNumber) && c.date === todayStr.value);
    };

    const selectedRoom = ref(null);
    const roomTimer = ref(0);
    let intervalTimer = null;
    const isRoomTimerRunning = ref(false);

    const localChecklist = ref([]);
    const localRoomInventory = ref([]);
    const localLinenIn = ref(0);
    const localLinenOut = ref(0);

    const completedChecklistCount = computed(() => {
      let count = 0;
      localChecklist.value.forEach(cat => {
        cat.items.forEach(item => {
          if (item.done) count++;
        });
      });
      return count;
    });

    const totalChecklistCount = computed(() => {
      let count = 0;
      localChecklist.value.forEach(cat => {
        count += cat.items.length;
      });
      return count;
    });
    
    const checklistProgress = computed(() => {
      if (totalChecklistCount.value === 0) return 0;
      return (completedChecklistCount.value / totalChecklistCount.value) * 100;
    });

    const openRoomDetail = (room) => {
      selectedRoom.value = room;
      roomTimer.value = 0;
      isRoomTimerRunning.value = false;
      
      // Parse dynamic checklist config
      try {
        const config = JSON.parse(room.checklist_config || "{}");
        localChecklist.value = Object.keys(config).map(catName => ({
          category: catName,
          type: config[catName].type,
          items: config[catName].items.map(item => ({ name: item, done: false }))
        }));
      } catch(e) {
        localChecklist.value = [];
      }

      // Parse room inventory items
      try {
        const inv = JSON.parse(room.room_inventory || "[]");
        localRoomInventory.value = Array.isArray(inv) ? JSON.parse(JSON.stringify(inv)) : [];
      } catch(e) {
        localRoomInventory.value = [];
      }

      localLinenIn.value = 0;
      localLinenOut.value = 0;
    };

    const formatTimer = (seconds) => {
      const h = Math.floor(seconds / 3600).toString().padStart(2, '0');
      const m = Math.floor((seconds % 3600) / 60).toString().padStart(2, '0');
      const s = (seconds % 60).toString().padStart(2, '0');
      return `${h}:${m}:${s}`;
    };

    const startRoomTimer = () => {
      isRoomTimerRunning.value = true;
      intervalTimer = setInterval(() => {
        roomTimer.value++;
      }, 1000);
    };

    const stopRoomTimer = () => {
      Swal.fire({
        title: 'Selesai?',
        text: "Anda yakin telah menyelesaikan semua checklist kamar ini?",
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#10B981',
        cancelButtonText: 'Batal',
        confirmButtonText: 'Ya, Selesai'
      }).then(async (result) => {
        if (result.isConfirmed) {
          clearInterval(intervalTimer);
          isRoomTimerRunning.value = false;
          
          // Prepare checklist payload
          const tasksCompleted = {};
          localChecklist.value.forEach(cat => {
            cat.items.forEach(item => {
              tasksCompleted[item.name] = item.done;
            });
          });
          
          const linenChanged = [
            { item: "Linen", in: Number(localLinenIn.value), out: Number(localLinenOut.value) }
          ];
          
          const refills = localRoomInventory.value.map(item => ({
            name: item.name,
            qty: Number(item.qty)
          }));
          
          const now = new Date();
          const endTimeISO = now.toISOString();
          const startTimeISO = new Date(now.getTime() - roomTimer.value * 1000).toISOString();
          
          const success = await submitRoomChecklistLocal(
            selectedRoom.value.room_number,
            todayStr.value,
            startTimeISO,
            endTimeISO,
            tasksCompleted,
            linenChanged,
            refills
          );
          
          if (success) {
            Swal.fire('Berhasil!', 'Data pengerjaan kamar disimpan ke Google Sheets.', 'success');
            selectedRoom.value = null;
          }
        }
      });
    };

    const updateRoomInventoryStaff = async (index, change) => {
      const item = localRoomInventory.value[index];
      if (change < 0 && Number(item.qty) <= 0) return;
      
      const oldQty = item.qty;
      item.qty = Number(item.qty) + change;
      
      // Update directly to Google Sheets
      const success = await updateRoomInventoryLocal(selectedRoom.value.room_number, localRoomInventory.value);
      if (!success) {
        // Rollback on failure
        item.qty = oldQty;
      }
    };

    // --- Housekeeping Projects Logic ---
    const dummyHouseKeeping = ref([
      { id: 1, title: 'Deep Cleaning Lorong A', desc: 'Bersihkan seluruh karpet lorong timur.', period: 'Mingguan', date: '11 Jul 2026', status: 'Pending' },
      { id: 2, title: 'Disinfektan Area Lobi', desc: 'Semprot seluruh area publik dengan disinfektan.', period: 'Harian', date: '11 Jul 2026', status: 'Selesai' }
    ]);
    const finishHouseKeeping = (proj) => {
      Swal.fire({
        title: 'Unggah Foto Dokumentasi',
        text: 'Ambil gambar langsung dari kamera atau pilih dari galeri.',
        icon: 'info',
        showCancelButton: true,
        confirmButtonText: 'Kamera / Galeri',
        cancelButtonText: 'Batal'
      }).then((result) => {
        if (result.isConfirmed) {
          Swal.fire('Terkirim!', 'Foto berhasil diunggah ke Google Drive dan tugas selesai.', 'success');
          proj.status = 'Selesai';
        }
      });
    };

    // --- Staff Work Projects Logic ---
    const dummyStaffProjects = ref([
      { id: 1, title: 'Pengecekan AC Kamar VIP', desc: 'Filter AC sudah kotor, dibersihkan dan dicuci', date: '10 Jul 2026', period: 'Bulanan' }
    ]);
    const showAddStaffProject = ref(false);
    const newStaffProject = ref({ title: '', desc: '' });
    const submitStaffProject = () => {
      if (!newStaffProject.value.title) return;
      dummyStaffProjects.value.unshift({
        id: Date.now(),
        title: newStaffProject.value.title,
        desc: newStaffProject.value.desc,
        date: currentDate.value,
        period: 'Harian'
      });
      Swal.fire('Berhasil', 'Laporan Proyek telah dikirim', 'success');
      showAddStaffProject.value = false;
      newStaffProject.value = { title: '', desc: '' };
    };

    // --- Misc Forms ---
    const submitLeave = () => {
      Swal.fire('Berhasil', 'Pengajuan izin/cuti telah dikirim ke Manager.', 'success');
    };
    
    // Inventory state
    const inventoryForm = ref({ item: '', qty: 1 });
    const inventoryHistory = ref([
      { id: 1, item: 'Sabun Kaca', qty: 2, time: '08:30 WIB' }
    ]);
    
    const submitInventory = () => {
      if (!inventoryForm.value.item || inventoryForm.value.qty < 1) return;
      
      const now = new Date();
      inventoryHistory.value.unshift({
        id: Date.now(),
        item: inventoryForm.value.item,
        qty: inventoryForm.value.qty,
        time: now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB'
      });
      
      Swal.fire({
        icon: 'success',
        title: 'Dicatat',
        text: 'Pengambilan barang berhasil ditambahkan ke riwayat.',
        timer: 1500,
        showConfirmButton: false
      });
      
      inventoryForm.value = { item: '', qty: 1 };
    };

    return {
      isInitializing,
      currentView,
      handleLogout,
      currentUser,
      currentShift,
      attendanceStatus,
      currentTime,
      currentDate,
      canClockIn,
      hasActiveLeaveToday,
      checkClockInWindow,
      toggleAttendance,
      navigate,
      // Room Control
      roomsList,
      isRoomCleanedToday,
      selectedRoom,
      roomTimer,
      isRoomTimerRunning,
      localChecklist,
      localRoomInventory,
      localLinenIn,
      localLinenOut,
      completedChecklistCount,
      totalChecklistCount,
      checklistProgress,
      openRoomDetail,
      formatTimer,
      startRoomTimer,
      stopRoomTimer,
      updateRoomInventoryStaff,
      // Housekeeping
      dummyHouseKeeping,
      finishHouseKeeping,
      // Staff Projects
      dummyStaffProjects,
      showAddStaffProject,
      newStaffProject,
      submitStaffProject,
      // Misc
      submitLeave,
      inventoryForm,
      inventoryHistory,
      submitInventory
    };
  }
}).mount('#app');
</script>

</body>
</html>
